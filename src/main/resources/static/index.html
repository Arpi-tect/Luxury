<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury — Premium Palace Hotel & Resort</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script>
      Babel.registerPreset("custom-react", {
        presets: [
          [Babel.availablePresets["react"], { runtime: "classic" }]
        ]
      });
    </script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --royal-blue-deep: #2C4875;
            --royal-blue: #5B7FB5;
            --royal-blue-light: #A9C0E0;
            --royal-blue-mist: #DCE6F4;
            --gold-primary: #D4AF37;
            --gold-soft: #E8C97A;
            --gold-light: #F6EBC8;
            --gold-shine: #FFE9A8;
            --ivory-white: #FDFBF6;
            --pearl-white: #FFFFFF;
            --text-dark: #2A2E3A;
            --text-muted: #6E7791;
            
            --bg-canvas: var(--ivory-white);
            --bg-card: rgba(255, 255, 255, 0.88);
            --border-panel: rgba(212, 175, 55, 0.22);
            --shadow-panel: rgba(44, 72, 117, 0.06);
            --text-main: var(--text-dark);
        }

        .dark-theme {
            --bg-canvas: #131722;
            --bg-card: rgba(28, 35, 51, 0.9);
            --border-panel: rgba(232, 201, 122, 0.25);
            --shadow-panel: rgba(0, 0, 0, 0.3);
            --text-main: #E2E8F0;
            --text-muted: #94A3B8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        h1, h2, h3, h4, .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }
        
        .font-cursive {
            font-family: 'Pinyon Script', cursive;
        }

        /* Hand-crafted asymmetric panels - avoids looking blocky or AI generated */
        .royal-panel {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-panel);
            box-shadow: 0 15px 40px -15px var(--shadow-panel);
            border-radius: 2.5rem 1rem 2.5rem 1rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .royal-panel-alt {
            border-radius: 1rem 2.5rem 1rem 2.5rem;
        }

        .glass-navbar {
            background: rgba(253, 251, 246, 0.88);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-panel);
        }

        .dark-theme .glass-navbar {
            background: rgba(19, 23, 34, 0.88);
        }

        /* Curtains & Beach Scene Animation keyframes */
        @keyframes sway-fold-1 {
            0%, 100% { transform: translateX(0px) skewX(0deg) scaleX(1); }
            50% { transform: translateX(6px) skewX(0.6deg) scaleX(1.02); }
        }
        @keyframes sway-fold-2 {
            0%, 100% { transform: translateX(0px) skewX(0deg) scaleX(1); }
            50% { transform: translateX(-5px) skewX(-0.5deg) scaleX(0.98); }
        }
        @keyframes sway-fold-3 {
            0%, 100% { transform: translateX(0px) skewX(0deg) scaleX(1); }
            50% { transform: translateX(7px) skewX(0.8deg) scaleX(1.03); }
        }
        @keyframes wave-sway-1 {
            0%, 100% { transform: translateY(0) scaleY(1); }
            50% { transform: translateY(8px) scaleY(1.04); }
        }
        @keyframes wave-sway-2 {
            0%, 100% { transform: translateY(0) scaleY(1); }
            50% { transform: translateY(-6px) scaleY(0.96); }
        }
        @keyframes blue-swag-flutter-left {
            0%, 100% { transform: skewY(0deg) scaleY(1); }
            50% { transform: skewY(0.4deg) scaleY(1.02); }
        }
        @keyframes blue-swag-flutter-right {
            0%, 100% { transform: skewY(0deg) scaleY(1); }
            50% { transform: skewY(-0.4deg) scaleY(1.02); }
        }

        .wave-animation-1 {
            animation: wave-sway-1 7s ease-in-out infinite;
        }
        .wave-animation-2 {
            animation: wave-sway-2 10s ease-in-out infinite;
        }
        .swag-left {
            animation: blue-swag-flutter-left 8s ease-in-out infinite;
            transform-origin: top left;
        }
        .swag-right {
            animation: blue-swag-flutter-right 9s ease-in-out infinite;
            transform-origin: top right;
        }

        .fold-1 {
            animation: sway-fold-1 11s ease-in-out infinite;
            transform-origin: top left;
        }
        .fold-2 {
            animation: sway-fold-2 14s ease-in-out infinite;
            transform-origin: top right;
        }
        .fold-3 {
            animation: sway-fold-3 9s ease-in-out infinite;
            transform-origin: top left;
        }

        /* credit card flip */
        .flip-card {
            background-color: transparent;
            perspective: 1000px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 1.5rem;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold-primary);
            border-radius: 4px;
        }

        @media print {
            body * {
                visibility: hidden;
            }
            #print-area, #print-area * {
                visibility: visible;
            }
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body class="min-h-screen relative flex flex-col">

    <!-- Global SVG gradients -->
    <svg class="hidden">
        <defs>
            <linearGradient id="goldSilkGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#D4AF37" />
                <stop offset="50%" stop-color="#FFE9A8" />
                <stop offset="100%" stop-color="#AA7C11" />
            </linearGradient>
            <linearGradient id="goldSilkGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#AA7C11" />
                <stop offset="30%" stop-color="#E8C97A" />
                <stop offset="70%" stop-color="#FFE9A8" />
                <stop offset="100%" stop-color="#8A6605" />
            </linearGradient>
            <linearGradient id="goldSilkGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#8A6605" />
                <stop offset="40%" stop-color="#D4AF37" />
                <stop offset="80%" stop-color="#FFE9A8" />
                <stop offset="100%" stop-color="#B8860B" />
            </linearGradient>
        </defs>
    </svg>

    <!-- Scenic Background: Window looking over Ocean Sunset and moving Waves with draping Blue & Gold curtains -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none print-hide">
        <!-- Golden sunset beach sky gradient -->
        <div class="absolute inset-0 bg-gradient-to-b from-[#FFEBCD]/50 via-[#FFD1B3]/40 to-[#DCE6F4]/50"></div>
        
        <!-- Moving Ocean Waves -->
        <div class="absolute bottom-0 left-0 right-0 h-44 opacity-25">
            <svg class="w-full h-full" viewBox="0 0 1440 320" preserveAspectRatio="none">
                <path class="wave-animation-1" d="M0,190 C320,230 640,150 960,190 T1440,210 L1440,320 L0,320 Z" fill="#A9C0E0" />
                <path class="wave-animation-2" d="M0,230 C320,270 640,200 960,230 T1440,240 L1440,320 L0,320 Z" fill="#5B7FB5" />
            </svg>
        </div>

        <!-- Royal arched double frame border simulating hotel room window layout -->
        <div class="absolute inset-6 border-[8px] border-double border-[#D4AF37]/20 rounded-[3rem] shadow-2xl"></div>

        <!-- Royal Blue Silk Valance/Swags (Top Drapes) -->
        <div class="absolute top-0 left-0 right-0 h-32 opacity-90">
            <svg class="w-full h-full" viewBox="0 0 1440 200" preserveAspectRatio="none">
                <defs>
                    <linearGradient id="blueSilk" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#2C4875" />
                        <stop offset="50%" stop-color="#5B7FB5" />
                        <stop offset="100%" stop-color="#1B2A4A" />
                    </linearGradient>
                </defs>
                <path class="swag-left" d="M0,0 Q360,150 720,50 L720,0 Z" fill="url(#blueSilk)" />
                <path class="swag-right" d="M720,50 Q1080,150 1440,0 L720,0 Z" fill="url(#blueSilk)" />
            </svg>
        </div>

        <!-- Golden curtains layout with tassels -->
        <div class="absolute left-0 top-0 bottom-0 w-24 md:w-36 opacity-85">
            <svg class="w-full h-full" viewBox="0 0 150 1000" preserveAspectRatio="none">
                <path class="curtain-fold fold-1" d="M0,0 Q40,120 20,280 T30,550 T22,800 T0,1000 L0,1000 Z" fill="url(#goldSilkGrad1)" />
                <path class="curtain-fold fold-2" d="M0,0 Q50,170 30,380 T40,750 T15,1000 L0,1000 Z" fill="url(#goldSilkGrad2)" />
                <path class="curtain-fold fold-3" d="M0,0 Q60,220 22,480 T50,850 T0,1000 L0,1000 Z" fill="url(#goldSilkGrad3)" />
            </svg>
        </div>
        <div class="absolute right-0 top-0 bottom-0 w-24 md:w-36 opacity-85 transform scale-x-[-1]">
            <svg class="w-full h-full" viewBox="0 0 150 1000" preserveAspectRatio="none">
                <path class="curtain-fold fold-1" d="M0,0 Q40,120 20,280 T30,550 T22,800 T0,1000 L0,1000 Z" fill="url(#goldSilkGrad1)" />
                <path class="curtain-fold fold-2" d="M0,0 Q50,170 30,380 T40,750 T15,1000 L0,1000 Z" fill="url(#goldSilkGrad2)" />
                <path class="curtain-fold fold-3" d="M0,0 Q60,220 22,480 T50,850 T0,1000 L0,1000 Z" fill="url(#goldSilkGrad3)" />
            </svg>
        </div>
    </div>

    <!-- Main Content Mount -->
    <div id="root" class="flex-grow flex flex-col z-10"></div>

    <script type="text/babel" data-presets="custom-react">
        const { useState, useEffect, useRef } = React;

        // Custom Card Tilt Hook
        function useTilt() {
            const ref = useRef(null);
            const handleMouseMove = (e) => {
                if (!ref.current) return;
                const card = ref.current;
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const xc = rect.width / 2;
                const yc = rect.height / 2;
                const angleX = (yc - y) / 18;
                const angleY = (x - xc) / 18;
                card.style.transform = `perspective(800px) rotateX(${angleX}deg) rotateY(${angleY}deg)`;
            };
            const handleMouseLeave = () => {
                if (!ref.current) return;
                ref.current.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg)';
            };
            return { ref, onMouseMove: handleMouseMove, onMouseLeave: handleMouseLeave };
        }

        // SVG Donut chart for Occupancy allocation
        function AllocationDonut({ distribution }) {
            const categories = ["Standard", "Deluxe", "Suite"];
            const values = categories.map(cat => distribution[cat] || 0);
            const total = values.reduce((a, b) => a + b, 0);

            let accumulated = 0;
            const colors = ["#5B7FB5", "#D4AF37", "#2C4875"];

            if (total === 0) {
                return <div className="text-center py-6 text-xs text-[#6E7791] font-semibold">No active allocations yet.</div>;
            }

            return (
                <div className="flex flex-col sm:flex-row items-center justify-around gap-4 p-4 bg-white/70 rounded-2xl border border-[#D4AF37]/15">
                    <svg className="w-28 h-28" viewBox="0 0 42 42">
                        <circle cx="21" cy="21" r="15.915" fill="transparent" stroke="#E2E8F0" strokeWidth="4.5" />
                        {categories.map((cat, idx) => {
                            const val = distribution[cat] || 0;
                            const percent = (val / total) * 100;
                            if (percent === 0) return null;
                            const dasharray = `${percent} ${100 - percent}`;
                            const dashoffset = 100 - accumulated + 25;
                            accumulated += percent;

                            return (
                                <circle 
                                    key={cat}
                                    cx="21" 
                                    cy="21" 
                                    r="15.915" 
                                    fill="transparent" 
                                    stroke={colors[idx]} 
                                    strokeWidth="4.5" 
                                    strokeDasharray={dasharray}
                                    strokeDashoffset={dashoffset}
                                    className="transition-all duration-300"
                                />
                            );
                        })}
                    </svg>
                    <div className="space-y-1 text-xs">
                        {categories.map((cat, idx) => (
                            <div key={cat} className="flex items-center gap-2">
                                <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: colors[idx] }}></span>
                                <span className="font-semibold text-[#2C4875]">{cat}:</span>
                                <span className="font-bold text-[#D4AF37]">{distribution[cat] || 0}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // SVG Bar Chart component
        function OccupancyBarChart({ distribution }) {
            const categories = ["Standard", "Deluxe", "Suite"];
            const values = categories.map(cat => distribution[cat] || 0);
            const maxValue = Math.max(...values, 4);

            const width = 360;
            const height = 180;
            const paddingLeft = 35;
            const paddingBottom = 25;
            const paddingTop = 15;
            const paddingRight = 10;

            const chartHeight = height - paddingTop - paddingBottom;
            const chartWidth = width - paddingLeft - paddingRight;
            const barWidth = 30;
            const gap = (chartWidth - barWidth * categories.length) / (categories.length + 1);

            const colors = { Standard: "#5B7FB5", Deluxe: "#D4AF37", Suite: "#2C4875" };

            return (
                <svg className="w-full h-auto bg-white/60 rounded-2xl border border-[#D4AF37]/15 p-2" viewBox={`0 0 ${width} ${height}`}>
                    {[0, 0.5, 1].map((ratio, idx) => {
                        const y = paddingTop + chartHeight * (1 - ratio);
                        const labelVal = Math.round(maxValue * ratio);
                        return (
                            <g key={idx}>
                                <line x1={paddingLeft} y1={y} x2={width - paddingRight} y2={y} stroke="rgba(44, 72, 117, 0.08)" strokeDasharray="3" />
                                <text x={paddingLeft - 8} y={y + 3} fill="#6E7791" fontSize="9" fontWeight="bold" textAnchor="end">{labelVal}</text>
                            </g>
                        );
                    })}
                    {categories.map((cat, idx) => {
                        const value = distribution[cat] || 0;
                        const barHeight = maxValue > 0 ? (value / maxValue) * chartHeight : 0;
                        const x = paddingLeft + gap + idx * (barWidth + gap);
                        const y = height - paddingBottom - barHeight;

                        return (
                            <g key={cat}>
                                <rect x={x} y={y} width={barWidth} height={barHeight} fill={colors[cat]} rx="4" />
                                <text x={x + barWidth / 2} y={y - 4} fill="#2C4875" fontSize="10" fontWeight="extrabold" textAnchor="middle">{value}</text>
                                <text x={x + barWidth / 2} y={height - paddingBottom + 14} fill="#6E7791" fontSize="9" fontWeight="bold" textAnchor="middle">{cat}</text>
                            </g>
                        );
                    })}
                </svg>
            );
        }

        // 360° Draggable Panorama Suite Tour
        function Tour360Viewer({ suiteCategory, onClose }) {
            const [panX, setPanX] = useState(0);
            const isDragging = useRef(false);
            const startX = useRef(0);

            const panoramas = {
                Standard: "https://images.unsplash.com/photo-1590490360182-c33d57733427?auto=format&fit=crop&w=1800&q=80",
                Deluxe: "https://images.unsplash.com/photo-1618773928121-c32242e63f39?auto=format&fit=crop&w=1800&q=80",
                Suite: "https://images.unsplash.com/photo-1582719478250-c89cae4db85b?auto=format&fit=crop&w=1800&q=80"
            };

            const url = panoramas[suiteCategory] || panoramas.Standard;

            const handleStart = (clientX) => {
                isDragging.current = true;
                startX.current = clientX - panX;
            };

            const handleMove = (clientX) => {
                if (!isDragging.current) return;
                const nextPan = clientX - startX.current;
                setPanX(Math.max(-520, Math.min(0, nextPan)));
            };

            const handleEnd = () => {
                isDragging.current = false;
            };

            return (
                <div className="fixed inset-0 bg-[#2C4875]/85 backdrop-blur-md flex items-center justify-center p-4 z-50">
                    <div className="bg-[#FDFBF6] max-w-4xl w-full rounded-[2rem] border-2 border-[#D4AF37]/35 overflow-hidden shadow-2xl relative">
                        <div className="bg-[#2C4875] text-white p-4.5 flex items-center justify-between border-b border-[#D4AF37]/20">
                            <div>
                                <h3 className="text-xl font-serif font-bold tracking-widest uppercase">Chamber 360° Virtual Inspector</h3>
                                <p className="text-[9px] text-[#FFE9A8] uppercase tracking-wider font-semibold">Drag horizontally to pan the interior layout</p>
                            </div>
                            <button onClick={onClose} className="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-full font-bold">✕</button>
                        </div>
                        
                        <div 
                            onMouseDown={(e) => handleStart(e.clientX)}
                            onMouseMove={(e) => handleMove(e.clientX)}
                            onMouseUp={handleEnd}
                            onMouseLeave={handleEnd}
                            onTouchStart={(e) => handleStart(e.touches[0].clientX)}
                            onTouchMove={(e) => handleMove(e.touches[0].clientX)}
                            onTouchEnd={handleEnd}
                            className="relative h-96 overflow-hidden cursor-ew-resize bg-black select-none"
                        >
                            <img 
                                src={url} 
                                alt="Suite Panorama" 
                                className="absolute top-0 h-full max-w-none"
                                style={{ 
                                    transform: `translateX(${panX}px)`,
                                    width: '180%' 
                                }}
                            />
                            
                            {/* Interactive hotspots */}
                            <div className="absolute top-1/3 left-1/3 group cursor-help" style={{ transform: `translateX(${panX * 0.4}px)` }}>
                                <span className="absolute h-4.5 w-4.5 rounded-full bg-[#D4AF37] opacity-75 animate-ping"></span>
                                <span className="relative inline-flex rounded-full h-4.5 w-4.5 bg-[#D4AF37] text-white text-[9px] items-center justify-center border border-white font-extrabold">i</span>
                                <div className="absolute left-6 top-0 hidden group-hover:block bg-white text-[#2C4875] text-[10px] p-2 rounded-lg shadow-md font-bold whitespace-nowrap">Canopy King Bed</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Royal Concierge AI Bot with triggers & voice search
        function RoyalConciergeWidget() {
            const [open, setOpen] = useState(false);
            const [messages, setMessages] = useState([
                { sender: "bot", text: "Greetings, noble guest. I am your Royal Concierge. How may I elevate your experience at Luxury today?" }
            ]);
            const [input, setInput] = useState("");
            const [typing, setTyping] = useState(false);

            const streamMessage = (text) => {
                setTyping(true);
                let idx = 0;
                const words = text.split(" ");
                let currentText = "";

                const interval = setInterval(() => {
                    if (idx < words.length) {
                        currentText += (idx === 0 ? "" : " ") + words[idx];
                        setMessages(prev => {
                            const list = prev.slice(0, -1);
                            return [...list, { sender: "bot", text: currentText }];
                        });
                        idx++;
                    } else {
                        clearInterval(interval);
                        setTyping(false);
                    }
                }, 70);
            };

            const handleSend = (e, customText) => {
                if (e) e.preventDefault();
                const queryText = customText || input;
                if (!queryText.trim()) return;

                setMessages(prev => [...prev, { sender: "user", text: queryText }, { sender: "bot", text: "..." }]);
                setInput("");

                setTimeout(() => {
                    let reply = "I am consulting our Royal registry. We offer bespoke standard rooms ($100), deluxe chambers ($180), and palace suites ($350) with premium add-on services.";
                    const query = queryText.toLowerCase();

                    if (query.includes("price") || query.includes("rate") || query.includes("cost")) {
                        reply = "Our palace chambers offer distinct tiers: Standard rooms ($100/night), Deluxe sanctuaries ($180/night), and Imperial Suites ($350/night).";
                    } else if (query.includes("spa") || query.includes("breakfast") || query.includes("perk")) {
                        reply = "Elevate your stay with our Royal Buffet Breakfast ($15/day), Airport Transfer Shuttle ($30 flat), and VIP Wellness Spa Lounge pass ($50 flat).";
                    } else if (query.includes("loyalty") || query.includes("gold") || query.includes("silver") || query.includes("platinum")) {
                        reply = "Earn privileges across Silver, Royal Gold, and Platinum King tiers. Perks include late checkout, butler assistance, and custom spa entries.";
                    }
                    streamMessage(reply);
                }, 500);
            };

            return (
                <div className="fixed bottom-6 right-6 z-40 print-hide">
                    <button 
                        onClick={() => setOpen(!open)}
                        className="w-14 h-14 bg-gradient-to-tr from-[#D4AF37] to-[#E8C97A] text-white rounded-full flex items-center justify-center shadow-lg hover:scale-105 transition"
                    >
                        {open ? <span className="text-xl font-bold">✕</span> : "💬"}
                    </button>

                    {open && (
                        <div className="absolute bottom-16 right-0 w-80 sm:w-96 h-[430px] royal-panel border border-[#D4AF37]/35 shadow-2xl flex flex-col overflow-hidden">
                            <div className="bg-gradient-to-r from-[#2C4875] to-[#5B7FB5] p-4 text-white text-center">
                                <h3 className="font-serif text-lg font-bold tracking-widest">Royal Concierge</h3>
                                <p className="text-[9px] uppercase tracking-wider opacity-85">Where Every Stay is a Reign</p>
                            </div>

                            <div className="flex-grow p-4 overflow-y-auto space-y-3 bg-[#FDFBF6]/90">
                                {messages.map((m, idx) => (
                                    <div key={idx} className={`flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`p-3 rounded-2xl max-w-[80%] text-xs shadow-sm ${
                                            m.sender === 'user' 
                                                ? 'bg-[#2C4875] text-white rounded-tr-none' 
                                                : 'bg-white text-[#2A2E3A] border border-[#D4AF37]/15 rounded-tl-none'
                                        }`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                            </div>

                    setBookings(bookingsData);

                    const analyticsRes = await fetch('/api/hotel/analytics');
                    const analyticsData = await analyticsRes.json();
                    setAnalytics(analyticsData);
                } catch (err) {
                    console.error("Error loading hotel details:", err);
                }
            };

            const handleRoomSelect = (roomNo) => {
                setSelectedRoomNo(roomNo.toString());
            };

            const handleBookingComplete = (data) => {
                setActiveReceipt(data);
                setSelectedRoomNo("");
                fetchInitialData();
                setView("receipt");
            };

            const handleCancelBooking = async (bookingId) => {
                if (!window.confirm(`Are you sure you want to cancel booking: ${bookingId}?`)) return;
                try {
                    await fetch(`/api/hotel/cancel/${bookingId}`, { method: 'DELETE' });
                    fetchInitialData();
                } catch (err) {
                    console.error("Error cancelling booking:", err);
                }
            };

            const handleAddRoom = async (roomObj) => {
                setRooms(prev => [...prev, roomObj]);
                alert("Room successfully registered!");
            };

            return (
                <div className="max-w-6xl mx-auto flex-grow flex flex-col p-4 md:p-8 space-y-8 z-10 relative">
                    
                    {/* Header frosted glass navbar */}
                    <div className="glass-panel rounded-3xl p-6 flex flex-col md:flex-row items-center justify-between gap-4 border-t border-white print-hide">
                        <div className="text-center md:text-left cursor-pointer" onClick={() => setView("home")}>
                            <h1 className="text-3xl font-extrabold tracking-widest text-[#2C4875] font-serif">LUXURY</h1>
                            <p className="text-[10px] font-bold text-[#D4AF37] uppercase tracking-widest mt-0.5">Where Every Stay is a Reign</p>
                        </div>

                        <div className="flex flex-wrap gap-2 md:gap-4 items-center">
                            <button onClick={() => setView("home")} className={`px-4 py-2 font-bold rounded-xl transition duration-200 text-xs ${view === 'home' ? 'bg-[#2C4875] text-white shadow-md' : 'text-[#6E7791] hover:bg-[#F6EBC8]/30'}`}>Lobby</button>
                            <button onClick={() => setView("explorer")} className={`px-4 py-2 font-bold rounded-xl transition duration-200 text-xs ${view === 'explorer' ? 'bg-[#2C4875] text-white shadow-md' : 'text-[#6E7791] hover:bg-[#F6EBC8]/30'}`}>Chamber Grid</button>
                            <button onClick={() => setView("loyalty")} className={`px-4 py-2 font-bold rounded-xl transition duration-200 text-xs ${view === 'loyalty' ? 'bg-[#2C4875] text-white shadow-md' : 'text-[#6E7791] hover:bg-[#F6EBC8]/30'}`}>Guest Directory</button>
                            <button onClick={() => setView("admin")} className={`px-4 py-2 font-bold rounded-xl transition duration-200 text-xs ${view === 'admin' ? 'bg-[#2C4875] text-white shadow-md' : 'text-[#6E7791] hover:bg-[#F6EBC8]/30'}`}>Manager Console</button>
                            
                            <button onClick={toggleTheme} className="w-8 h-8 rounded-full border border-[#D4AF37]/35 flex items-center justify-center text-sm bg-white shadow-inner">{darkMode ? '☀️' : '🌙'}</button>
                        </div>
                    </div>

                    {/* Page Content Viewport */}
                    <div className="flex-grow">
                        {view === "home" && <HomeView onExploreClick={() => setView("explorer")} />}
                        {view === "explorer" && <ExplorerView rooms={rooms} bookings={bookings} selectedRoomNo={selectedRoomNo} onRoomSelect={handleRoomSelect} onBookClick={() => setView("booking")} onLaunchTour={(cat) => setTourCategory(cat)} />}
                        {view === "booking" && <BookingWizard rooms={rooms} selectedRoomNo={selectedRoomNo} bookings={bookings} onBookingComplete={handleBookingComplete} />}
                        {view === "receipt" && activeReceipt && <BookingConfirmation bookingData={activeReceipt} onDone={() => setView("home")} />}
                        {view === "loyalty" && <LoyaltyDashboard bookings={bookings} />}
                        {view === "admin" && <AdminDashboard rooms={rooms} bookings={bookings} analytics={analytics} onCancelBooking={handleCancelBooking} onAddRoom={handleAddRoom} />}
                    </div>

                    {tourCategory && <Tour360Viewer suiteCategory={tourCategory} onClose={() => setTourCategory(null)} />}
                    <RoyalConciergeWidget />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
