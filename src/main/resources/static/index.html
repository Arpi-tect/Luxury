<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury - Premium Palace Hotel Reservation System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script>
      Babel.registerPreset("custom-react", {
        presets: [
          [Babel.availablePresets["react"], { runtime: "classic" }]
        ]
      });
    </script>
    <!-- Google Identity Services (OAuth) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-blue-deep: #2C4875;
            --royal-blue: #5B7FB5;
            --royal-blue-light: #A9C0E0;
            --royal-blue-mist: #DCE6F4;
            --gold-primary: #D4AF37;
            --gold-soft: #E8C97A;
            --gold-light: #F6EBC8;
            --gold-shine: #FFE9A8;
            --ivory-white: #FDFBF6;
            --pearl-white: #FFFFFF;
            --text-dark: #2A2E3A;
            --text-muted: #6E7791;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--ivory-white);
            color: var(--text-dark);
            overflow-x: hidden;
        }
        h1, h2, h3, h4, .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }
        /* Glassmorphism panels - extremely light and frosted */
        .glass-panel {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(212, 175, 55, 0.16);
            box-shadow: 0 10px 30px -10px rgba(44, 72, 117, 0.08);
        }
        .glass-navbar {
            background: rgba(253, 251, 246, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.12);
        }
        /* Custom sway keyframes for ambient golden curtains */
        @keyframes sway-fold-1 {
            0%, 100% { transform: translateX(0px) skewX(0deg); }
            50% { transform: translateX(5px) skewX(0.7deg); }
        }
        @keyframes sway-fold-2 {
            0%, 100% { transform: translateX(0px) skewX(0deg); }
            50% { transform: translateX(-4px) skewX(-0.5deg); }
        }
        @keyframes sway-fold-3 {
            0%, 100% { transform: translateX(0px) skewX(0deg); }
            50% { transform: translateX(6px) skewX(0.9deg); }
        }
        @keyframes shimmer-gold {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .fold-1 {
            animation: sway-fold-1 14s ease-in-out infinite;
            transform-origin: top left;
        }
        .fold-2 {
            animation: sway-fold-2 17s ease-in-out infinite;
            transform-origin: top right;
        }
        .fold-3 {
            animation: sway-fold-3 12s ease-in-out infinite;
            transform-origin: top left;
        }
        /* Custom styling for printing POS receipts */
        @media print {
            body * {
                visibility: hidden;
            }
            #print-area, #print-area * {
                visibility: visible;
            }
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                color: #000000 !important;
                background: #ffffff !important;
            }
            .print-clean {
                border: 2px solid #D4AF37 !important;
                padding: 3rem !important;
                border-radius: 0.5rem !important;
                box-shadow: none !important;
                background-color: #ffffff !important;
                color: #2A2E3A !important;
            }
            .print-hide {
                display: none !important;
            }
        }
    </style>
</head>
<body class="min-h-screen relative">
    <div id="root"></div>

    <!-- Global SVG defs for golden silk curtain gradients -->
    <svg class="hidden">
        <defs>
            <linearGradient id="goldSilkGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#D4AF37" />
                <stop offset="50%" stop-color="#FFE9A8" />
                <stop offset="100%" stop-color="#AA7C11" />
            </linearGradient>
            <linearGradient id="goldSilkGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#AA7C11" />
                <stop offset="30%" stop-color="#E8C97A" />
                <stop offset="70%" stop-color="#FFE9A8" />
                <stop offset="100%" stop-color="#8A6605" />
            </linearGradient>
            <linearGradient id="goldSilkGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#8A6605" />
                <stop offset="40%" stop-color="#D4AF37" />
                <stop offset="80%" stop-color="#FFE9A8" />
                <stop offset="100%" stop-color="#B8860B" />
            </linearGradient>
        </defs>
    </svg>

    <!-- Signature Background Ambient Curtains (Perpetual wind-blown sway, never close) -->
    <div class="fixed left-0 top-0 bottom-0 w-24 pointer-events-none z-0 opacity-75 filter blur-[0.6px] print-hide">
        <svg class="w-full h-full" viewBox="0 0 100 1000" preserveAspectRatio="none">
            <path class="curtain-fold fold-1" d="M0,0 Q35,120 12,280 T25,550 T18,800 T0,1000 L0,1000 Z" fill="url(#goldSilkGrad1)" />
            <path class="curtain-fold fold-2" d="M0,0 Q45,170 25,380 T35,750 T12,1000 L0,1000 Z" fill="url(#goldSilkGrad2)" />
            <path class="curtain-fold fold-3" d="M0,0 Q55,220 18,480 T45,850 T0,1000 L0,1000 Z" fill="url(#goldSilkGrad3)" />
        </svg>
    </div>
    <div class="fixed right-0 top-0 bottom-0 w-24 pointer-events-none z-0 opacity-75 filter blur-[0.6px] transform scale-x-[-1] print-hide">
        <svg class="w-full h-full" viewBox="0 0 100 1000" preserveAspectRatio="none">
            <path class="curtain-fold fold-1" d="M0,0 Q35,120 12,280 T25,550 T18,800 T0,1000 L0,1000 Z" fill="url(#goldSilkGrad1)" />
            <path class="curtain-fold fold-2" d="M0,0 Q45,170 25,380 T35,750 T12,1000 L0,1000 Z" fill="url(#goldSilkGrad2)" />
            <path class="curtain-fold fold-3" d="M0,0 Q55,220 18,480 T45,850 T0,1000 L0,1000 Z" fill="url(#goldSilkGrad3)" />
        </svg>
    </div>

    <script type="text/babel" data-presets="custom-react">
        const { useState, useEffect } = React;

        function decodeJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                console.error("JWT decoding failed:", e);
                return null;
            }
        }

        // SVG Vertical Bar Chart for category occupancy metrics
        function PopularityChart({ distribution }) {
            const categories = ["Standard", "Deluxe", "Suite"];
            const values = categories.map(cat => distribution[cat] || 0);
            const maxValue = Math.max(...values, 4);

            const width = 450;
            const height = 240;
            const paddingLeft = 45;
            const paddingBottom = 35;
            const paddingTop = 25;
            const paddingRight = 20;

            const chartHeight = height - paddingTop - paddingBottom;
            const chartWidth = width - paddingLeft - paddingRight;

            const barWidth = 45;
            const gap = (chartWidth - barWidth * categories.length) / (categories.length + 1);

            const colors = {
                Standard: "#5B7FB5", // Royal blue
                Deluxe: "#D4AF37",  // Gold
                Suite: "#2C4875"    // Deep blue
            };

            return (
                <svg className="w-full h-auto bg-white/70 rounded-2xl border border-[#D4AF37]/15 p-2 shadow-inner" viewBox={`0 0 ${width} ${height}`}>
                    {[0, 0.25, 0.5, 0.75, 1].map((ratio, idx) => {
                        const y = paddingTop + chartHeight * (1 - ratio);
                        const labelVal = Math.round(maxValue * ratio);
                        return (
                            <g key={idx}>
                                <line x1={paddingLeft} y1={y} x2={width - paddingRight} y2={y} stroke="rgba(44, 72, 117, 0.08)" strokeDasharray="3" />
                                <text x={paddingLeft - 8} y={y + 3} fill="#6E7791" fontSize="9" fontWeight="bold" textAnchor="end">{labelVal}</text>
                            </g>
                        );
                    })}

                    {categories.map((cat, idx) => {
                        const value = distribution[cat] || 0;
                        const barHeight = maxValue > 0 ? (value / maxValue) * chartHeight : 0;
                        const x = paddingLeft + gap + idx * (barWidth + gap);
                        const y = height - paddingBottom - barHeight;

                        return (
                            <g key={cat} className="group">
                                <rect 
                                    x={x} 
                                    y={y} 
                                    width={barWidth} 
                                    height={barHeight} 
                                    fill={colors[cat]} 
                                    rx="6"
                                    className="transition-all duration-300 hover:brightness-105 cursor-pointer shadow-md"
                                />
                                <text 
                                    x={x + barWidth / 2} 
                                    y={y - 6} 
                                    fill="#2C4875" 
                                    fontSize="10" 
                                    fontWeight="extrabold" 
                                    textAnchor="middle"
                                >
                                    {value}
                                </text>
                                <text 
                                    x={x + barWidth / 2} 
                                    y={height - paddingBottom + 16} 
                                    fill="#6E7791" 
                                    fontSize="10" 
                                    fontWeight="bold" 
                                    textAnchor="middle"
                                >
                                    {cat}
                                </text>
                            </g>
                        );
                    })}
                </svg>
            );
        }

        // POS-style receipt printing modal
        function ReceiptModal({ booking, roomDetails, onClose }) {
            if (!booking) return null;

            const roomCategory = roomDetails?.category || "Standard";
            const roomRate = roomDetails?.pricePerNight || 0.0;
            
            const roomTotal = roomRate * booking.nights;
            const breakfastTotal = booking.breakfast ? 15.0 * booking.nights : 0.0;
            const shuttleTotal = booking.shuttle ? 30.0 : 0.0;
            const spaTotal = booking.spa ? 50.0 : 0.0;

            return (
                <div className="fixed inset-0 bg-[#2C4875]/35 backdrop-blur-md flex items-center justify-center p-4 z-50 overflow-y-auto print-hide">
                    <div className="bg-[#FDFBF6] max-w-lg w-full rounded-3xl border-2 border-[#D4AF37]/30 p-8 shadow-2xl relative print-clean" id="print-area">
                        <button 
                            onClick={onClose} 
                            className="absolute top-4 right-4 text-[#6E7791] hover:text-[#2A2E3A] font-bold text-lg print-hide"
                        >
                            ✕
                        </button>
                        
                        <div className="text-center border-b border-[#D4AF37]/20 pb-4 mb-6">
                            <h2 className="text-2xl font-extrabold tracking-widest text-[#2C4875] uppercase">LUXURY</h2>
                            <p className="text-[10px] text-[#D4AF37] font-bold uppercase tracking-widest mt-1">Where Every Stay is a Reign</p>
                        </div>

                        <div className="grid grid-cols-2 gap-4 text-xs mb-6 text-[#2A2E3A]">
                            <div>
                                <span className="block text-[#6E7791] font-bold uppercase tracking-wider text-[8px]">Guest Name</span>
                                <span className="font-extrabold text-sm text-[#2C4875]">{booking.guestName}</span>
                            </div>
                            <div>
                                <span className="block text-[#6E7791] font-bold uppercase tracking-wider text-[8px]">Booking Ref</span>
                                <span className="font-extrabold text-sm text-[#D4AF37]">{booking.bookingId}</span>
                            </div>
                            <div>
                                <span className="block text-[#6E7791] font-bold uppercase tracking-wider text-[8px]">ID Credentials</span>
                                <span className="font-bold">{booking.idType} ({booking.idNumber})</span>
                            </div>
                            <div>
                                <span className="block text-[#6E7791] font-bold uppercase tracking-wider text-[8px]">Contact</span>
                                <span className="font-bold">{booking.contact}</span>
                            </div>
                        </div>

                        <div className="bg-white/60 p-4 rounded-2xl border border-[#D4AF37]/10 text-xs mb-6 space-y-2">
                            <div className="flex justify-between">
                                <span className="font-bold text-[#6E7791]">Allocated Suite:</span>
                                <span className="font-extrabold text-[#2C4875]">Suite {booking.roomNumber} ({roomCategory})</span>
                            </div>
                            <div className="flex justify-between">
                                <span className="font-bold text-[#6E7791]">Duration:</span>
                                <span className="font-extrabold text-[#2C4875]">{booking.nights} night(s)</span>
                            </div>
                        </div>

                        <h4 className="text-[10px] font-bold text-[#D4AF37] uppercase tracking-widest mb-3 border-b border-[#D4AF37]/20 pb-1.5">Invoice Detail</h4>
                        <div className="space-y-2.5 text-xs mb-8">
                            <div className="flex justify-between">
                                <span className="text-[#6E7791]">Base Suite Rate ({booking.nights} nights @ ${roomRate}/night)</span>
                                <span className="font-bold text-[#2A2E3A]">${roomTotal.toFixed(2)}</span>
                            </div>
                            {booking.breakfast && (
                                <div className="flex justify-between">
                                    <span className="text-[#6E7791]">Royal Breakfast Buffet add-on</span>
                                    <span className="font-bold text-[#2A2E3A]">${breakfastTotal.toFixed(2)}</span>
                                </div>
                            )}
                            {booking.shuttle && (
                                <div className="flex justify-between">
                                    <span className="text-[#6E7791]">Palace Shuttle pickup transfer</span>
                                    <span className="font-bold text-[#2A2E3A]">${shuttleTotal.toFixed(2)}</span>
                                </div>
                            )}
                            {booking.spa && (
                                <div className="flex justify-between">
                                    <span className="text-[#6E7791]">Royal Wellness Spa lounge pass</span>
                                    <span className="font-bold text-[#2A2E3A]">${spaTotal.toFixed(2)}</span>
                                </div>
                            )}
                            <div className="flex justify-between border-t border-[#D4AF37]/20 pt-3 mt-3">
                                <span className="text-sm font-extrabold text-[#2C4875]">Grand Total Paid</span>
                                <span className="text-xl font-extrabold text-[#D4AF37]">${booking.totalCost.toFixed(2)}</span>
                            </div>
                        </div>

                        <div className="flex gap-4 print-hide">
                            <button 
                                onClick={() => window.print()}
                                className="flex-grow py-3 bg-[#D4AF37] hover:bg-[#E8C97A] text-white font-bold rounded-xl transition duration-200 shadow-lg shadow-[#D4AF37]/25 flex items-center justify-center gap-2"
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                                </svg>
                                Print Receipt
                            </button>
                            <button 
                                onClick={onClose}
                                className="px-5 py-3 bg-white border border-[#D4AF37]/20 hover:bg-[#F6EBC8] text-[#6E7791] font-bold rounded-xl transition"
                            >
                                Close
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Royal Concierge AI Bot Widget
        function RoyalConcierge() {
            const [open, setOpen] = useState(false);
            const [messages, setMessages] = useState([
                { sender: "bot", text: "Greetings, valued guest. I am your Royal Concierge. How may I elevate your stay at Luxury today?" }
            ]);
            const [input, setInput] = useState("");

            const handleSend = (e) => {
                e.preventDefault();
                if (!input.trim()) return;

                const userMsg = { sender: "user", text: input };
                const updatedMsgs = [...messages, userMsg];
                setMessages(updatedMsgs);
                setInput("");

                // Simulated intelligent concierge logic
                setTimeout(() => {
                    let replyText = "I am consulting our Royal registry. We offer bespoke standard rooms ($100), deluxe chambers ($180), and palace suites ($350) with premium add-on services. How can I assist you with your booking?";
                    const query = input.toLowerCase();

                    if (query.includes("room") || query.includes("suite") || query.includes("price")) {
                        replyText = "Our Royal Suites feature breathtaking view options. Standard chambers are $100/night, Deluxe suites are $180/night, and our master Palace Suites are $350/night.";
                    } else if (query.includes("spa") || query.includes("breakfast") || query.includes("shuttle") || query.includes("add-on")) {
                        replyText = "Certainly. You can enhance your reservation with our Gourmet Breakfast ($15/night), Airport Shuttle Transfer ($30 flat), and VIP Spa Lounge Access ($50 flat).";
                    } else if (query.includes("loyalty") || query.includes("points") || query.includes("tier")) {
                        replyText = "Our Royal Loyalty system features Silver, Gold, and Platinum tiers. As you book nights, you accumulate points to unlock custom spa amenities, room upgrades, and late checkout features.";
                    } else if (query.includes("cancel") || query.includes("refund")) {
                        replyText = "Cancellations made prior to 24 hours of check-in are eligible for a full instant refund. You can manage and cancel any stay from the Guest Directory tab.";
                    }

                    setMessages(prev => [...prev, { sender: "bot", text: replyText }]);
                }, 800);
            };

            return (
                <div className="fixed bottom-6 right-6 z-40 print-hide">
                    {/* Toggle button */}
                    <button 
                        onClick={() => setOpen(!open)}
                        className="w-14 h-14 bg-gradient-to-tr from-[#D4AF37] to-[#E8C97A] text-white rounded-full flex items-center justify-center shadow-lg hover:scale-105 transition-transform duration-200"
                    >
                        {open ? (
                            <span className="text-xl font-bold">✕</span>
                        ) : (
                            <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M8.25 21v-4.875c0-.621.504-1.125 1.125-1.125h5.25c.621 0 1.125.504 1.125 1.125V21m0 0h4.5V3.545M2.25 21h1.5m18 0h-18M2.25 9l4.5-1.636M18.75 3l-1.5.545m0 6.545v3m-3-6.545h.008M21 21V3.545M3 21V9.545M12 6.75h.008M12 9.75h.008M12 12.75h.008M12 15.75h.008" />
                            </svg>
                        )}
                    </button>

                    {/* Chat Window */}
                    {open && (
                        <div className="absolute bottom-16 right-0 w-80 sm:w-96 h-[420px] glass-panel rounded-3xl border border-[#D4AF37]/30 shadow-2xl flex flex-col overflow-hidden">
                            <div className="bg-gradient-to-r from-[#2C4875] to-[#5B7FB5] p-4 text-white text-center">
                                <h3 className="font-serif text-lg font-bold tracking-widest">Royal Concierge</h3>
                                <p className="text-[9px] uppercase tracking-wider opacity-85">Where Every Stay is a Reign</p>
                            </div>

                            {/* Feed */}
                            <div className="flex-grow p-4 overflow-y-auto space-y-3 bg-[#FDFBF6]/90">
                                {messages.map((m, idx) => (
                                    <div key={idx} className={`flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`p-3 rounded-2xl max-w-[80%] text-xs shadow-sm ${
                                            m.sender === 'user' 
                                                ? 'bg-[#2C4875] text-white rounded-tr-none' 
                                                : 'bg-white text-[#2A2E3A] border border-[#D4AF37]/15 rounded-tl-none'
                                        }`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Input Form */}
                            <form onSubmit={handleSend} className="p-3 bg-white border-t border-[#D4AF37]/15 flex gap-2">
                                <input 
                                    type="text"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder="Inquire with the concierge..."
                                    className="flex-grow px-4 py-2 border border-[#D4AF37]/25 rounded-full text-xs focus:outline-none focus:ring-1 focus:ring-[#D4AF37] bg-[#FDFBF6]"
                                />
                                <button type="submit" className="px-4 py-2 bg-[#D4AF37] hover:bg-[#E8C97A] text-white rounded-full text-xs font-bold transition">
                                    Send
                                </button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        function Login({ onLogin }) {
            const handleGuestLogin = () => {
                onLogin({
                    name: "Guest Custodian",
                    email: "guest@luxuryhotel.com",
                    picture: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&q=80",
                    isGuest: true
                });
            };

            useEffect(() => {
                window.handleCredentialResponse = (response) => {
                    const user = decodeJwt(response.credential);
                    if (user) {
                        onLogin({
                            name: user.name,
                            email: user.email,
                            picture: user.picture,
                            isGuest: false
                        });
                    }
                };
            }, [onLogin]);

            return (
                <div className="flex items-center justify-center min-h-[85vh] px-4">
                    <div className="glass-panel rounded-3xl p-10 max-w-md w-full border-t-2 border-[#D4AF37]/35 text-center relative overflow-hidden">
                        <div className="absolute -top-24 -left-24 w-48 h-48 bg-[#FFE9A8]/20 rounded-full blur-3xl"></div>
                        <div className="absolute -bottom-24 -right-24 w-48 h-48 bg-[#A9C0E0]/20 rounded-full blur-3xl"></div>

                        <div className="w-20 h-20 bg-gradient-to-tr from-[#D4AF37] to-[#E8C97A] rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-[#D4AF37]/15">
                            <svg className="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                            </svg>
                        </div>

                        <h1 className="text-3xl font-extrabold tracking-widest text-[#2C4875] mb-2 font-serif">LUXURY</h1>
                        <p className="text-xs text-[#D4AF37] mb-8 font-semibold tracking-widest uppercase">Where Every Stay is a Reign</p>

                        <div className="space-y-4">
                            <div className="flex justify-center">
                                <div id="g_id_onload"
                                     data-client_id="855919652758-om1b3kpg3hbfbfl4b5o89s56oas58fl7.apps.googleusercontent.com"
                                     data-context="signin"
                                     data-ux_mode="popup"
                                     data-callback="handleCredentialResponse"
                                     data-auto_prompt="false">
                                </div>
                                <div className="g_id_signin"
                                     data-type="standard"
                                     data-shape="pill"
                                     data-theme="filled_blue"
                                     data-text="signin_with"
                                     data-size="large"
                                     data-logo_alignment="left">
                                </div>
                            </div>

                            <div className="flex items-center my-4">
                                <div className="flex-grow border-t border-[#D4AF37]/15"></div>
                                <span className="mx-4 text-xs text-[#6E7791] font-bold uppercase tracking-wider">or</span>
                                <div className="flex-grow border-t border-[#D4AF37]/15"></div>
                            </div>

                            <button 
                                onClick={handleGuestLogin}
                                className="w-full py-3 bg-[#2C4875] hover:bg-[#5B7FB5] text-white font-bold rounded-full transition duration-200 shadow-md flex items-center justify-center gap-2"
                            >
                                <svg className="w-5 h-5 text-[#FFE9A8]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                                Continue to Lobby
                            </button>
                        </div>

                        <div className="mt-8 text-[10px] text-[#6E7791] leading-relaxed">
                            Bypass the gates to inspect palace room catalogs, check guest registries, and run hotel analytics.
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [userProfile, setUserProfile] = useState(null);

            const [rooms, setRooms] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [activeTab, setActiveTab] = useState('catalog'); // catalog | reservations | analytics
            const [filterCategory, setFilterCategory] = useState('All');
            
            // Booking form fields
            const [guestName, setGuestName] = useState('');
            const [contact, setContact] = useState('');
            const [selectedRoomNo, setSelectedRoomNo] = useState('');
            const [nights, setNights] = useState('1');
            const [idType, setIdType] = useState('Passport');
            const [idNumber, setIdNumber] = useState('');

            // Add-on service flags
            const [breakfast, setBreakfast] = useState(false);
            const [shuttle, setShuttle] = useState(false);
            const [spa, setSpa] = useState(false);

            // Hotel operations metrics
            const [analytics, setAnalytics] = useState({
                totalRooms: 0,
                occupiedRooms: 0,
                occupancyRate: 0.0,
                grossRevenue: 0.0,
                revPar: 0.0,
                categoryDistribution: { Standard: 0, Deluxe: 0, Suite: 0 }
            });

            // Receipt modal holder
            const [activeReceipt, setActiveReceipt] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const session = localStorage.getItem("luxury_session");
                if (session) {
                    const profile = JSON.parse(session);
                    setUserProfile(profile);
                    setIsLoggedIn(true);
                }
                fetchInitialData();
            }, []);

            const fetchInitialData = async () => {
                try {
                    const roomsRes = await fetch('/api/hotel/rooms');
                    const roomsData = await roomsRes.json();
                    setRooms(roomsData);

                    const bookingsRes = await fetch('/api/hotel/bookings');
                    const bookingsData = await bookingsRes.json();
                    setBookings(bookingsData);

                    const analyticsRes = await fetch('/api/hotel/analytics');
                    const analyticsData = await analyticsRes.json();
                    setAnalytics(analyticsData);

                    setLoading(false);
                } catch (err) {
                    console.error("Error loading hotel details:", err);
                    setLoading(false);
                }
            };

            const isRoomBooked = (roomNo) => {
                return bookings.some(b => b.roomNumber === roomNo);
            };

            const handleRoomSelect = (roomNo) => {
                if (isRoomBooked(roomNo)) return;
                setSelectedRoomNo(roomNo.toString());
            };

            const handleLogin = (profile) => {
                setUserProfile(profile);
                setIsLoggedIn(true);
                localStorage.setItem("luxury_session", JSON.stringify(profile));
            };

            const handleSignOut = () => {
                setUserProfile(null);
                setIsLoggedIn(false);
                localStorage.removeItem("luxury_session");
            };

            const handleBook = async (e) => {
                e.preventDefault();
                if (!guestName.trim() || !contact.trim() || !selectedRoomNo || !nights.trim() || !idNumber.trim()) {
                    alert("Please select an available suite and complete all guest details.");
                    return;
                }

                const qtyNights = parseInt(nights);
                if (isNaN(qtyNights) || qtyNights <= 0) {
                    alert("Duration must be 1 night or more.");
                    return;
                }

                const selectedRoom = rooms.find(r => r.roomNumber === parseInt(selectedRoomNo));
                const roomRate = selectedRoom?.pricePerNight || 0;
                
                const roomCost = roomRate * qtyNights;
                const breakfastCost = breakfast ? 15.0 * qtyNights : 0.0;
                const shuttleCost = shuttle ? 30.0 : 0.0;
                const spaCost = spa ? 50.0 : 0.0;
                const grandTotal = roomCost + breakfastCost + shuttleCost + spaCost;

                const confirm = window.confirm(
                    `Confirm Reservation details & Invoice:\n\n` +
                    `Suite: ${selectedRoomNo} (${selectedRoom?.category})\n` +
                    `Rate: $${roomRate}/night for ${qtyNights} night(s)\n\n` +
                    `Invoice Itemization:\n` +
                    `- Base Chamber Stay: $${roomCost.toFixed(2)}\n` +
                    `- Breakfast Buffet add-on: $${breakfastCost.toFixed(2)}\n` +
                    `- Palace Shuttle pick-up: $${shuttleCost.toFixed(2)}\n` +
                    `- VIP Spa Lounge pass: $${spaCost.toFixed(2)}\n\n` +
                    `Total Cost: $${grandTotal.toFixed(2)}\n\n` +
                    `Proceed to pay?`
                );

                if (!confirm) return;

                try {
                    const params = new URLSearchParams();
                    params.append('guestName', guestName.trim());
                    params.append('contact', contact.trim());
                    params.append('roomNumber', selectedRoomNo);
                    params.append('nights', qtyNights);
                    params.append('idType', idType);
                    params.append('idNumber', idNumber.trim());
                    params.append('breakfast', breakfast.toString());
                    params.append('shuttle', shuttle.toString());
                    params.append('spa', spa.toString());

                    const res = await fetch(`/api/hotel/book?${params.toString()}`, {
                        method: 'POST'
                    });
                    const data = await res.json();

                    if (data.success) {
                        alert(`Booking Confirmed!\nReference Code: ${data.bookingId}`);
                        
                        // Clear form state
                        setGuestName('');
                        setContact('');
                        setSelectedRoomNo('');
                        setNights('1');
                        setIdNumber('');
                        setBreakfast(false);
                        setShuttle(false);
                        setSpa(false);

                        // Reload data
                        await fetchInitialData();
                        setActiveTab('reservations');
                    } else {
                        alert(data.message);
                    }
                } catch (err) {
                    console.error("Error booking room:", err);
                }
            };

            const handleCancel = async (bookingId) => {
                if (!window.confirm(`Are you sure you want to cancel booking: ${bookingId}?`)) return;

                try {
                    const res = await fetch(`/api/hotel/cancel/${bookingId}`, {
                        method: 'DELETE'
                    });
                    const data = await res.json();
                    alert(data.message);
                    fetchInitialData();
                } catch (err) {
                    console.error("Error cancelling booking:", err);
                }
            };

            if (!isLoggedIn) {
                return <Login onLogin={handleLogin} />;
            }

            if (loading) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[#D4AF37]"></div>
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto z-10 relative px-4">
                    {/* Header */}
                    <div className="glass-panel rounded-3xl p-6 mb-8 flex flex-col md:flex-row items-center justify-between gap-4 border-t border-white print-hide">
                        <div className="text-center md:text-left">
                            <h1 className="text-3xl font-extrabold tracking-widest text-[#2C4875] font-serif">LUXURY</h1>
                            <p className="text-[10px] font-bold text-[#D4AF37] uppercase tracking-widest mt-0.5">Where Every Stay is a Reign</p>
                        </div>
                        
                        <div className="flex items-center gap-4 bg-white/40 px-4 py-2 rounded-2xl border border-[#D4AF37]/15">
                            <img src={userProfile.picture} referrerPolicy="no-referrer" className="w-8 h-8 rounded-full border border-[#D4AF37]/30 object-cover" />
                            <div className="text-left">
                                <div className="text-xs font-bold text-[#2C4875] leading-tight">{userProfile.name}</div>
                                <div className="text-[9px] text-[#6E7791] leading-tight">{userProfile.email}</div>
                            </div>
                            
                            {/* Loyalty Progress Tracker */}
                            <div className="hidden sm:flex items-center gap-2 border-l border-[#D4AF37]/10 pl-3">
                                <span className="text-[10px] font-bold text-[#D4AF37] uppercase tracking-widest">Royal Gold</span>
                                <div className="w-16 bg-[#DCE6F4] h-1.5 rounded-full overflow-hidden border border-[#D4AF37]/10">
                                    <div className="bg-[#D4AF37] h-full" style={{ width: '65%' }}></div>
                                </div>
                            </div>

                            <button 
                                onClick={handleSignOut}
                                className="ml-2 text-[10px] font-bold text-rose-600 bg-rose-50 hover:bg-rose-100 px-2.5 py-1.5 rounded-lg transition"
                            >
                                Leave
                            </button>
                        </div>
                    </div>

                    {/* Navigation Tabs */}
                    <div className="flex flex-wrap gap-4 mb-8 print-hide">
                        <button 
                            onClick={() => setActiveTab('catalog')}
                            className={`px-6 py-3 font-bold rounded-xl transition duration-200 shadow-sm text-sm ${activeTab === 'catalog' ? 'bg-[#2C4875] text-white shadow-[#2C4875]/20' : 'glass-panel text-[#6E7791] hover:bg-[#F6EBC8]/30'}`}
                        >
                            Room Grid & Booking
                        </button>
                        <button 
                            onClick={() => setActiveTab('reservations')}
                            className={`px-6 py-3 font-bold rounded-xl transition duration-200 shadow-sm text-sm ${activeTab === 'reservations' ? 'bg-[#2C4875] text-white shadow-[#2C4875]/20' : 'glass-panel text-[#6E7791] hover:bg-[#F6EBC8]/30'}`}
                        >
                            Guest Directory ({bookings.length})
                        </button>
                        <button 
                            onClick={() => setActiveTab('analytics')}
                            className={`px-6 py-3 font-bold rounded-xl transition duration-200 shadow-sm text-sm ${activeTab === 'analytics' ? 'bg-[#2C4875] text-white shadow-[#2C4875]/20' : 'glass-panel text-[#6E7791] hover:bg-[#F6EBC8]/30'}`}
                        >
                            Manager Analytics
                        </button>
                    </div>

                    {/* Tab Switch Viewports */}
                    <div className="print-hide">
                        {/* Tab 1: Catalog & Booking */}
                        {activeTab === 'catalog' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                {/* Room Catalog Status Grid (2 Cols) */}
                                <div className="glass-panel rounded-3xl p-6 lg:col-span-2 border-t border-white">
                                    <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6 pb-2 border-b border-[#D4AF37]/15">
                                        <h2 className="text-xl font-bold text-[#2C4875] mb-2 sm:mb-0">Palace Suites status</h2>
                                        
                                        <div className="flex items-center space-x-2 text-sm">
                                            <span className="font-semibold text-[#6E7791]">Category:</span>
                                            <select 
                                                value={filterCategory}
                                                onChange={(e) => setFilterCategory(e.target.value)}
                                                className="px-3 py-1.5 bg-white/80 border border-[#D4AF37]/20 rounded-lg focus:outline-none text-[#2A2E3A] font-semibold text-xs"
                                            >
                                                <option value="All">All Tiers</option>
                                                <option value="Standard">Standard ($100)</option>
                                                <option value="Deluxe">Deluxe ($180)</option>
                                                <option value="Suite">Suite ($350)</option>
                                            </select>
                                        </div>
                                    </div>

                                    {/* Room Grid Cards */}
                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
                                        {rooms
                                            .filter(r => filterCategory === 'All' || r.category === filterCategory)
                                            .map((r) => {
                                                const booked = isRoomBooked(r.roomNumber);
                                                const isSelected = selectedRoomNo === r.roomNumber.toString();
                                                return (
                                                    <div 
                                                        key={r.roomNumber}
                                                        onClick={() => handleRoomSelect(r.roomNumber)}
                                                        className={`p-4 rounded-2xl border text-center transition duration-200 cursor-pointer relative ${
                                                            booked 
                                                                ? 'bg-rose-500/5 border-rose-500/10 text-rose-900/30 cursor-not-allowed opacity-50' 
                                                                : isSelected 
                                                                    ? 'bg-[#D4AF37] border-[#D4AF37] text-white shadow-lg shadow-[#D4AF37]/20' 
                                                                    : 'bg-white/85 hover:bg-[#F6EBC8]/20 border-[#D4AF37]/15 text-[#2C4875]'
                                                        }`}
                                                    >
                                                        <div className="text-[9px] uppercase tracking-wider font-extrabold mb-1 opacity-70">{r.category}</div>
                                                        <div className="text-2xl font-extrabold mb-1 font-serif">Suite {r.roomNumber}</div>
                                                        <div className="text-xs font-bold opacity-80">${r.pricePerNight}/night</div>
                                                        <div className="mt-3">
                                                            <span className={`inline-block px-2.5 py-0.5 rounded-full text-[9px] font-extrabold uppercase ${
                                                                booked 
                                                                    ? 'bg-rose-500/15 text-rose-500' 
                                                                    : isSelected 
                                                                        ? 'bg-white/20 text-white' 
                                                                        : 'bg-[#5B7FB5]/10 text-[#5B7FB5]'
                                                            }`}>
                                                                {booked ? 'Occupied' : isSelected ? 'Selected' : 'Available'}
                                                            </span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                    </div>

                                    {/* Panoramic 360° tour placeholder */}
                                    <div className="mt-8 bg-white/55 border border-[#D4AF37]/15 rounded-3xl p-5 relative overflow-hidden flex flex-col md:flex-row items-center justify-between gap-4">
                                        <div className="text-center md:text-left z-10">
                                            <h4 className="text-lg font-serif font-bold text-[#2C4875]">Palace 360° Virtual Suite Tour</h4>
                                            <p className="text-xs text-[#6E7791] mt-1">Immerse yourself inside our royal layout before booking</p>
                                        </div>
                                        <button className="z-10 px-4.5 py-2.5 bg-gradient-to-tr from-[#D4AF37] to-[#E8C97A] hover:brightness-105 text-white font-bold rounded-xl text-xs transition duration-200 flex items-center gap-2 shadow-md">
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                            </svg>
                                            Launch Tour
                                        </button>
                                        <div className="absolute right-0 bottom-0 top-0 w-1/2 opacity-10 bg-[radial-gradient(circle_at_right,_var(--gold-primary)_0%,_transparent_60%)]"></div>
                                    </div>
                                </div>

                                {/* Booking Checkout Form (1 Col) */}
                                <div className="glass-panel rounded-3xl p-6 h-fit border-t border-white">
                                    <h2 className="text-xl font-bold text-[#2C4875] mb-6 pb-2 border-b border-[#D4AF37]/15">Reserve Suite</h2>
                                    <form onSubmit={handleBook} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-[#6E7791] uppercase mb-1">Guest Name</label>
                                            <input 
                                                type="text"
                                                value={guestName}
                                                onChange={(e) => setGuestName(e.target.value)}
                                                placeholder="e.g. Jane Smith"
                                                className="w-full px-4 py-2.5 bg-white border border-[#D4AF37]/20 rounded-xl focus:outline-none focus:ring-1 focus:ring-[#D4AF37] text-xs text-[#2A2E3A]"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-[#6E7791] uppercase mb-1">Contact Details</label>
                                            <input 
                                                type="tel"
                                                value={contact}
                                                onChange={(e) => setContact(e.target.value)}
                                                placeholder="e.g. +91 9876543210"
                                                className="w-full px-4 py-2.5 bg-white border border-[#D4AF37]/20 rounded-xl focus:outline-none focus:ring-1 focus:ring-[#D4AF37] text-xs text-[#2A2E3A]"
                                                required
                                            />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-[#6E7791] uppercase mb-1">Credential ID</label>
                                                <select
                                                    value={idType}
                                                    onChange={(e) => setIdType(e.target.value)}
                                                    className="w-full px-4 py-2.5 bg-white border border-[#D4AF37]/20 rounded-xl focus:outline-none focus:ring-1 focus:ring-[#D4AF37] text-xs text-[#2A2E3A] font-semibold"
                                                >
                                                    <option value="Passport">Passport</option>
                                                    <option value="National ID">National ID</option>
                                                    <option value="Driver's License">Driver's License</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-[#6E7791] uppercase mb-1">Doc Number</label>
                                                <input 
                                                    type="text"
                                                    value={idNumber}
                                                    onChange={(e) => setIdNumber(e.target.value)}
                                                    placeholder="A1234567B"
                                                    className="w-full px-4 py-2.5 bg-white border border-[#D4AF37]/20 rounded-xl focus:outline-none focus:ring-1 focus:ring-[#D4AF37] text-xs text-[#2A2E3A]"
                                                    required
                                                />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-[#6E7791] uppercase mb-1">Assigned Suite</label>
                                                <input 
                                                    type="text"
                                                    value={selectedRoomNo}
                                                    placeholder="Select room"
                                                    className="w-full px-4 py-2.5 bg-[#F6EBC8]/15 border border-[#D4AF37]/20 rounded-xl text-[#D4AF37] font-bold text-center focus:outline-none text-xs"
                                                    readOnly
                                                    required
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-[#6E7791] uppercase mb-1">Duration (Nights)</label>
                                                <input 
                                                    type="number"
                                                    value={nights}
                                                    onChange={(e) => setNights(e.target.value)}
                                                    min="1"
                                                    className="w-full px-4 py-2.5 bg-white border border-[#D4AF37]/20 rounded-xl focus:outline-none focus:ring-1 focus:ring-[#D4AF37] text-xs text-[#2A2E3A] font-bold text-center"
                                                    required
                                                />
                                            </div>
                                        </div>
                                        
                                        {/* Add-on services checklist */}
                                        <div className="bg-[#FFE9A8]/10 p-4 rounded-2xl border border-[#D4AF37]/15 space-y-2">
                                            <h4 className="text-[10px] font-bold text-[#D4AF37] uppercase tracking-widest border-b border-[#D4AF37]/15 pb-1.5 mb-2">Exclusive Palace Perks</h4>
                                            
                                            <label className="flex items-center justify-between cursor-pointer group text-xs text-[#2A2E3A]">
                                                <span className="font-semibold group-hover:text-[#2C4875]">Breakfast Buffet (+$15/day)</span>
                                                <input 
                                                    type="checkbox"
                                                    checked={breakfast}
                                                    onChange={(e) => setBreakfast(e.target.checked)}
                                                    className="w-4 h-4 rounded text-[#D4AF37] bg-white border-[#D4AF37]/20 focus:ring-0"
                                                />
                                            </label>

                                            <label className="flex items-center justify-between cursor-pointer group text-xs text-[#2A2E3A]">
                                                <span className="font-semibold group-hover:text-[#2C4875]">Private Airport Shuttle (+$30 flat)</span>
                                                <input 
                                                    type="checkbox"
                                                    checked={shuttle}
                                                    onChange={(e) => setShuttle(e.target.checked)}
                                                    className="w-4 h-4 rounded text-[#D4AF37] bg-white border-[#D4AF37]/20 focus:ring-0"
                                                />
                                            </label>

                                            <label className="flex items-center justify-between cursor-pointer group text-xs text-[#2A2E3A]">
                                                <span className="font-semibold group-hover:text-[#2C4875]">VIP Spa Lounge Pass (+$50 flat)</span>
                                                <input 
                                                    type="checkbox"
                                                    checked={spa}
                                                    onChange={(e) => setSpa(e.target.checked)}
                                                    className="w-4 h-4 rounded text-[#D4AF37] bg-white border-[#D4AF37]/20 focus:ring-0"
                                                />
                                            </label>
                                        </div>

                                        <button 
                                            type="submit"
                                            className="w-full py-3 bg-[#2C4875] hover:bg-[#5B7FB5] text-white font-bold rounded-xl transition duration-200 shadow-lg shadow-[#2C4875]/25 focus:outline-none text-xs"
                                        >
                                            Confirm Reservation
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Tab 2: Guest Directory */}
                        {activeTab === 'reservations' && (
                            <div className="glass-panel rounded-3xl p-6 border-t border-white">
                                <h2 className="text-xl font-bold text-[#2C4875] mb-6 pb-2 border-b border-[#D4AF37]/15">Active Bookings Directory</h2>
                                {bookings.length === 0 ? (
                                    <div className="text-center py-10 text-[#6E7791] font-medium">No active guest bookings found.</div>
                                ) : (
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="text-[#6E7791] font-semibold text-xs border-b border-[#D4AF37]/15 uppercase tracking-wider">
                                                    <th className="py-3 px-4">Booking Ref</th>
                                                    <th className="py-3 px-4">Guest Name</th>
                                                    <th className="py-3 px-4">Credentials</th>
                                                    <th className="py-3 px-4 text-center">Suite</th>
                                                    <th className="py-3 px-4 text-center">Nights</th>
                                                    <th className="py-3 px-4 text-center">Invoice Total</th>
                                                    <th className="py-3 px-4 text-right">Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {bookings.map((b) => (
                                                    <tr key={b.bookingId} className="border-b border-slate-200/50 hover:bg-[#F6EBC8]/10 transition">
                                                        <td className="py-4 px-4 font-extrabold text-[#D4AF37]">{b.bookingId}</td>
                                                        <td className="py-4 px-4 font-bold text-[#2A2E3A]">
                                                            <div>{b.guestName}</div>
                                                            <div className="text-[10px] text-[#6E7791] font-normal">{b.contact}</div>
                                                        </td>
                                                        <td className="py-4 px-4 text-[#6E7791] text-xs">
                                                            <span className="font-semibold text-[#2C4875]">{b.idType}</span>
                                                            <span className="block text-[10px] opacity-75">{b.idNumber}</span>
                                                        </td>
                                                        <td className="py-4 px-4 text-center font-bold text-[#2C4875] font-serif">{b.roomNumber}</td>
                                                        <td className="py-4 px-4 text-center text-[#2A2E3A] font-semibold">{b.nights}</td>
                                                        <td className="py-4 px-4 text-center font-extrabold text-[#2C4875]">${b.totalCost.toFixed(2)}</td>
                                                        <td className="py-4 px-4 text-right space-x-2">
                                                            <button 
                                                                onClick={() => setActiveReceipt(b)}
                                                                className="px-3.5 py-1.5 bg-[#D4AF37]/10 text-[#D4AF37] font-bold rounded-lg hover:bg-[#D4AF37]/20 transition text-xs"
                                                            >
                                                                Invoice Receipt
                                                            </button>
                                                            <button 
                                                                onClick={() => handleCancel(b.bookingId)}
                                                                className="px-3.5 py-1.5 bg-rose-50/10 text-rose-600 font-bold rounded-lg hover:bg-rose-50 transition text-xs"
                                                            >
                                                                Cancel
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Tab 3: Manager Analytics */}
                        {activeTab === 'analytics' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                {/* Performance Dashboard Stats */}
                                <div className="lg:col-span-1 space-y-6">
                                    <div className="glass-panel rounded-3xl p-6 border-t border-white">
                                        <h3 className="text-xs font-bold text-[#D4AF37] uppercase tracking-widest mb-4">Operations Metrics</h3>
                                        
                                        <div className="space-y-4">
                                            <div className="bg-white/60 p-4 rounded-2xl border border-[#D4AF37]/15">
                                                <span className="block text-[10px] text-[#6E7791] font-bold uppercase tracking-wider mb-1">Occupancy Rate</span>
                                                <div className="flex items-baseline gap-2">
                                                    <span className="text-3xl font-extrabold text-[#2C4875] font-serif">{analytics.occupancyRate.toFixed(1)}%</span>
                                                    <span className="text-xs text-[#6E7791]">({analytics.occupiedRooms} / {analytics.totalRooms} suites)</span>
                                                </div>
                                                <div className="w-full bg-[#DCE6F4] rounded-full h-2 mt-3 overflow-hidden border border-[#D4AF37]/10">
                                                    <div className="bg-[#D4AF37] h-full transition-all duration-500" style={{ width: `${analytics.occupancyRate}%` }}></div>
                                                </div>
                                            </div>

                                            <div className="bg-white/60 p-4 rounded-2xl border border-[#D4AF37]/15">
                                                <span className="block text-[10px] text-[#6E7791] font-bold uppercase tracking-wider mb-1">Gross Revenue</span>
                                                <span className="text-3xl font-extrabold text-[#2C4875] font-serif">${analytics.grossRevenue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                                            </div>

                                            <div className="bg-white/60 p-4 rounded-2xl border border-[#D4AF37]/15">
                                                <span className="block text-[10px] text-[#6E7791] font-bold uppercase tracking-wider mb-1">Revenue per Available Suite (RevPAR)</span>
                                                <span className="text-3xl font-extrabold text-[#2C4875] font-serif">${analytics.revPar.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Popularity Chart */}
                                <div className="glass-panel rounded-3xl p-6 lg:col-span-2 border-t border-white flex flex-col justify-between">
                                    <div>
                                        <h2 className="text-xl font-bold text-[#2C4875] mb-1">Suite Booking Popularity</h2>
                                        <p className="text-[10px] text-[#6E7791] uppercase font-semibold mb-6">Distribution count of active reservations by room tier</p>
                                    </div>
                                    <PopularityChart distribution={analytics.categoryDistribution} />
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Receipt print area overlay */}
                    {activeReceipt && (
                        <ReceiptModal 
                            booking={activeReceipt}
                            roomDetails={rooms.find(r => r.roomNumber === activeReceipt.roomNumber)}
                            onClose={() => setActiveReceipt(null)}
                        />
                    )}

                    {/* Royal Concierge floating AI bot */}
                    <RoyalConcierge />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
