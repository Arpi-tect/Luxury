<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury — Premium Palace Hotel & Resort</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script>
      Babel.registerPreset("custom-react", {
        presets: [
          [Babel.availablePresets["react"], { runtime: "classic" }]
        ]
      });
    </script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --royal-blue-deep: #1A325A;
            --royal-blue: #4A6FA5;
            --royal-blue-light: #9BB7E2;
            --royal-blue-mist: #E5EEF9;
            --gold-primary: #C5A030;
            --gold-soft: #D9B855;
            --gold-light: #F4E4B5;
            --gold-shine: #FFF1C5;
            --ivory-white: #FCFAF2;
            --pearl-white: #FFFFFF;
            --text-dark: #1F2430;
            --text-muted: #5E6982;
            
            --bg-canvas: transparent;
            --bg-card: rgba(252, 250, 242, 0.12);
            --border-panel: rgba(197, 160, 48, 0.3);
            --shadow-panel: rgba(26, 50, 90, 0.08);
            --text-main: var(--text-dark);
        }

        .dark-theme {
            --royal-blue-deep: #F4E4B5;
            --royal-blue: #9BB7E2;
            --royal-blue-light: #4A6FA5;
            --royal-blue-mist: #1A325A;
            --bg-canvas: transparent;
            --bg-card: rgba(15, 20, 32, 0.28);
            --border-panel: rgba(217, 184, 85, 0.35);
            --shadow-panel: rgba(0, 0, 0, 0.4);
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0F131E; /* Master backdrop frame */
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        h1, h2, h3, h4, .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }
        
        .font-cursive {
            font-family: 'Pinyon Script', cursive;
        }

        /* Royal Glassmorphic Panel - zero boxy feel, highly transparent and glowing */
        .royal-panel {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-panel);
            box-shadow: 0 30px 60px -25px var(--shadow-panel), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            border-radius: 2.5rem 0.5rem 2.5rem 0.5rem;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Ornate Double-Page Parchment Guestbook Style for Wizard Checkout & forms */
        .parchment-book {
            background: linear-gradient(135deg, rgba(252, 250, 242, 0.3) 0%, rgba(246, 241, 226, 0.2) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 2px double var(--border-panel);
            box-shadow: 0 35px 80px -30px rgba(11, 21, 38, 0.15), inset 0 1px 2px rgba(255, 255, 255, 0.3);
            border-radius: 3rem;
            position: relative;
            transition: all 0.4s ease;
        }

        /* Glass navbar banner shape */
        .glass-navbar {
            background: rgba(252, 250, 242, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1.5px solid var(--border-panel);
            box-shadow: 0 10px 30px -10px rgba(26, 50, 90, 0.05);
        }

        .dark-theme .glass-navbar {
            background: rgba(15, 20, 32, 0.35);
        }

        /* Custom filigree corner brackets */
        .filigree-corner::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            width: 16px;
            height: 16px;
            border-top: 1.5px solid var(--gold-primary);
            border-left: 1.5px solid var(--gold-primary);
            opacity: 0.8;
        }
        .filigree-corner::after {
            content: '';
            position: absolute;
            top: 8px;
            right: 8px;
            width: 16px;
            height: 16px;
            border-top: 1.5px solid var(--gold-primary);
            border-right: 1.5px solid var(--gold-primary);
            opacity: 0.8;
        }
        .filigree-bottom::before {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 8px;
            width: 16px;
            height: 16px;
            border-bottom: 1.5px solid var(--gold-primary);
            border-left: 1.5px solid var(--gold-primary);
            opacity: 0.8;
        }
        .filigree-bottom::after {
            content: '';
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 16px;
            height: 16px;
            border-bottom: 1.5px solid var(--gold-primary);
            border-right: 1.5px solid var(--gold-primary);
            opacity: 0.8;
        }

        /* Arched images mirroring palace lobby windows */
        .arched-frame {
            border-radius: 8rem 8rem 1rem 1rem;
            border: 2px solid rgba(197, 160, 48, 0.35);
            box-shadow: 0 12px 30px -10px rgba(26, 50, 90, 0.15);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Ocean Sky Sunset & Waves Parallax animations */
        @keyframes skyGlowGrad {
            0%, 100% { background-position: 50% 0%; }
            50% { background-position: 50% 100%; }
        }
        @keyframes waveMove1 {
            0%, 100% { transform: translate(0, 0) scaleY(1); }
            50% { transform: translate(-60px, 6px) scaleY(1.04); }
        }
        @keyframes waveMove2 {
            0%, 100% { transform: translate(0, 0) scaleY(1); }
            50% { transform: translate(45px, -5px) scaleY(0.96); }
        }
        @keyframes waveMove3 {
            0%, 100% { transform: translate(0, 0) scaleY(1); }
            50% { transform: translate(-30px, 3px) scaleY(1.02); }
        }
        @keyframes cloudDriftSlow {
            0% { transform: translateX(-150px); }
            100% { transform: translateX(1150px); }
        }
        @keyframes cloudDriftFast {
            0% { transform: translateX(-200px); }
            100% { transform: translateX(1150px); }
        }

        .sunset-sky-back {
            background: linear-gradient(180deg, #1E2942 0%, #3B5888 35%, #F0A55D 65%, #F7CFA0 85%, #FCFAF2 100%);
            background-size: 100% 200%;
            animation: skyGlowGrad 24s ease infinite;
        }
        .wave-layer-1 { animation: waveMove1 14s ease-in-out infinite; }
        .wave-layer-2 { animation: waveMove2 18s ease-in-out infinite; }
        .wave-layer-3 { animation: waveMove3 11s ease-in-out infinite; }
        .cloud-slow { animation: cloudDriftSlow 80s linear infinite; }
        .cloud-fast { animation: cloudDriftFast 50s linear infinite; }

        /* Curtain Sway Animations */
        @keyframes swayLeftCurtain {
            0%, 100% { transform: rotate(0deg) skewX(0deg) scaleX(1); }
            50% { transform: rotate(1deg) skewX(1.5deg) scaleX(1.03); }
        }
        @keyframes swayRightCurtain {
            0%, 100% { transform: rotate(0deg) skewX(0deg) scaleX(1); }
            50% { transform: rotate(-1deg) skewX(-1.5deg) scaleX(1.03); }
        }
        @keyframes flutterValance {
            0%, 100% { transform: skewY(0deg) scaleY(1); }
            50% { transform: skewY(0.5deg) scaleY(1.02); }
        }

        .curtain-sway-left {
            animation: swayLeftCurtain 12s ease-in-out infinite;
            transform-origin: top left;
        }
        .curtain-sway-right {
            animation: swayRightCurtain 14s ease-in-out infinite;
            transform-origin: top right;
        }
        .valance-flutter {
            animation: flutterValance 9s ease-in-out infinite;
            transform-origin: top center;
        }

        /* Gold underline input style */
        .gold-input {
            background: transparent !important;
            border-bottom: 1.5px solid rgba(197, 160, 48, 0.45);
            color: var(--text-dark) !important;
            border-radius: 0px !important;
            padding-left: 4px;
            padding-right: 4px;
            transition: all 0.3s ease;
        }
        .gold-input:focus {
            outline: none;
            border-bottom-color: var(--gold-primary);
            box-shadow: 0 4px 12px -4px rgba(197, 160, 48, 0.15);
        }

        .dark-theme .gold-input {
            color: #F1F5F9 !important;
            border-bottom-color: rgba(217, 184, 85, 0.45);
        }
        .dark-theme .gold-input:focus {
            border-bottom-color: var(--gold-soft);
        }

        /* Credit card flip */
        .flip-card {
            background-color: transparent;
            perspective: 1000px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 1.5rem;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold-primary);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(252, 250, 242, 0.15);
        }

        @media print {
            body * {
                visibility: hidden;
            }
            #print-area, #print-area * {
                visibility: visible;
            }
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body class="min-h-screen relative flex flex-col">

    <!-- Global SVG gradients -->
    <svg class="hidden">
        <defs>
            <linearGradient id="goldSilkGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#C5A030" />

            <linearGradient id="goldSilkGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#917316" />
                <stop offset="30%" stop-color="#D9B855" />
                <stop offset="70%" stop-color="#FFF1C5" />

    <!-- Scenic Background: Window looking over Ocean Sunset and moving Waves (z-0 layer) -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none print-hide">
        <!-- 1. The Seaside Sunset view (placed behind the wall) -->
        <div class="absolute inset-0 z-0 flex items-center justify-center">
            <!-- Ocean sky sunset gradient -->
            <div class="absolute inset-0 sunset-sky-back"></div>
            
            <!-- Shimmering Sunset Sun -->
            <div class="absolute bottom-44 w-44 h-44 rounded-full bg-gradient-to-t from-[#FFE9A8] to-[#FFF] filter blur-[6px] opacity-75 animate-pulse"></div>
            
            <!-- Drifting Clouds -->
            <div class="absolute inset-0 opacity-25">
                <svg class="absolute w-36 h-16 top-24 left-16 cloud-slow" viewBox="0 0 120 60" fill="#FFF">

            </div>
            
            <!-- Multi-layered Animated Ocean Waves -->
            <div class="absolute bottom-0 left-0 right-0 h-64 overflow-hidden">

                    <path class="wave-layer-1" d="M0,180 C360,220 720,140 1080,180 T1440,200 L1440,320 L0,320 Z" fill="#9BB7E2" opacity="0.45" />
                    <path class="wave-layer-2" d="M0,210 C360,250 720,180 1080,210 T1440,230 L1440,320 L0,320 Z" fill="#4A6FA5" opacity="0.65" />
                    <path class="wave-layer-3" d="M0,240 C360,270 720,210 1080,240 T1440,260 L1440,320 L0,320 Z" fill="#1A325A" />
                </svg>

        </div>

        <!-- 2. The Ivory Room Wall Overlay with Arch Window Cutout (placed in front of the sunset view) -->
        <svg class="absolute inset-0 w-full h-full z-10" viewBox="0 0 1000 1000" preserveAspectRatio="none">
            <defs>
                <radialGradient id="wallGlow" cx="50%" cy="50%" r="70%">
                    <stop offset="0%" stop-color="#FCFAF2" />
                    <stop offset="80%" stop-color="#F5EFE0" />

                </radialGradient>
                <radialGradient id="darkWallGlow" cx="50%" cy="50%" r="70%">
                    <stop offset="0%" stop-color="#1E2430" />
                    <stop offset="85%" stop-color="#141822" />
                    <stop offset="100%" stop-color="#0A0C12" />
                </radialGradient>
            </defs>
            <!-- A path with evenodd fill that covers the screen and leaves an arched cutout in the center -->
            <path class="theme-wall-path" d="M0,0 H1000 V1000 H0 Z M180,1000 V350 C180,120 820,120 820,350 V1000 Z" fill="url(#wallGlow)" fill-rule="evenodd" />
            <script>
                // Synchronize custom wall fill with midnight theme
                document.addEventListener("DOMContentLoaded", function() {
                    const path = document.querySelector(".theme-wall-path");
                    const observer = new MutationObserver(() => {
                        const isDark = document.body.classList.contains("dark-theme");
                        path.setAttribute("fill", isDark ? "url(#darkWallGlow)" : "url(#wallGlow)");
                    });
                    observer.observe(document.body, { attributes: true, attributeFilter: ["class"] });
                    if (document.body.classList.contains("dark-theme")) {
                        path.setAttribute("fill", "url(#darkWallGlow)");
                    }
                });

            <!-- Ornate Gold Arch Border -->
            <path d="M180,1000 V350 C180,120 820,120 820,350 V1000" stroke="#C5A030" stroke-width="4.5" fill="none" opacity="0.8" />
            <path d="M172,1000 V350 C172,110 828,110 828,350 V1000" stroke="#FFF1C5" stroke-width="1.5" fill="none" opacity="0.65" />

            <!-- Left Curtain -->

                <svg class="w-full h-full curtain-sway-left" viewBox="0 0 150 1000" preserveAspectRatio="none">

            <!-- Right Curtain -->
            <div class="absolute right-0 top-0 bottom-0 w-24 md:w-56 lg:w-72 opacity-95 transform scale-x-[-1]">
                <svg class="w-full h-full curtain-sway-right" viewBox="0 0 150 1000" preserveAspectRatio="none">
                    <path d="M0,0 Q60,150 40,320 T55,600 T30,850 T0,1000 L0,1000 Z" fill="url(#goldSilkGrad1)" />
                    <path d="M0,0 Q75,200 50,440 T60,800 T22,1000 L0,1000 Z" fill="url(#goldSilkGrad2)" />
                    <path d="M0,0 Q90,250 35,550 T70,900 T0,1000 L0,1000 Z" fill="url(#goldSilkGrad3)" />
                </svg>
            </div>
            <!-- Top Blue Silk Valance/Swags -->
            <div class="absolute top-0 left-0 right-0 h-28 md:h-36 opacity-95 valance-flutter">
                <svg class="w-full h-full" viewBox="0 0 1440 200" preserveAspectRatio="none">
                    <defs>

                    <!-- Gold Tassel Fringe Border along Valance swags -->
                    <path d="M0,5 Q360,185 720,75 M720,75 Q1080,185 1440,5" stroke="#C5A030" stroke-width="3" fill="none" stroke-dasharray="2 4" />
                </svg>
            </div>
        </div>
    </div>

    <!-- Main Content Mount (z-10 layer - scrolls beautifully behind the foreground curtains) -->
    <div id="root" class="flex-grow flex flex-col z-10 relative"></div>

    <script type="text/babel" data-presets="custom-react">
        const { useState, useEffect, useRef } = React;

        // Custom Card Tilt Hook
        function useTilt() {
            const ref = useRef(null);
            const handleMouseMove = (e) => {
                if (!ref.current) return;
                const card = ref.current;
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const xc = rect.width / 2;
                const yc = rect.height / 2;
                const angleX = (yc - y) / 18;
                const angleY = (x - xc) / 18;
                card.style.transform = `perspective(800px) rotateX(${angleX}deg) rotateY(${angleY}deg)`;
            };
            const handleMouseLeave = () => {
                if (!ref.current) return;
                ref.current.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg)';
            };
            return { ref, onMouseMove: handleMouseMove, onMouseLeave: handleMouseLeave };
        }

        // SVG Donut chart for Occupancy allocation
        function AllocationDonut({ distribution }) {
            const categories = ["Standard", "Deluxe", "Suite"];
            const values = categories.map(cat => distribution[cat] || 0);
            const total = values.reduce((a, b) => a + b, 0);

            let accumulated = 0;
            const colors = ["#4A6FA5", "#C5A030", "#1A325A"];

            if (total === 0) {
                return <div className="text-center py-6 text-xs text-[#5E6982] font-semibold font-serif">No active room allocations registered at this hour.</div>;
            }

            return (
                <div className="flex flex-col sm:flex-row items-center justify-around gap-4 p-5 bg-white/10 rounded-2xl border border-[#C5A030]/20">
                    <svg className="w-28 h-28" viewBox="0 0 42 42">
                        <circle cx="21" cy="21" r="15.915" fill="transparent" stroke="rgba(197, 160, 48, 0.1)" strokeWidth="4.5" />
                        {categories.map((cat, idx) => {
                            const val = distribution[cat] || 0;
                            const percent = (val / total) * 100;
                            if (percent === 0) return null;
                            const dasharray = `${percent} ${100 - percent}`;
                            const dashoffset = 100 - accumulated + 25;
                            accumulated += percent;

                            return (
                                <circle 
                                    key={cat}
                                    cx="21" 
                                    cy="21" 
                                    r="15.915" 
                                    fill="transparent" 
                                    stroke={colors[idx]} 
                                    strokeWidth="4.5" 
                                    strokeDasharray={dasharray}
                                    strokeDashoffset={dashoffset}
                                    className="transition-all duration-300"
                                />
                            );
                        })}
                    </svg>
                    <div className="space-y-1 text-xs">
                        {categories.map((cat, idx) => (
                            <div key={cat} className="flex items-center gap-2">
                                <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: colors[idx] }}></span>
                                <span className="font-serif font-bold text-[#1A325A] dark:text-[#F4E4B5]">{cat}:</span>
                                <span className="font-extrabold text-[#C5A030]">{distribution[cat] || 0}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // SVG Bar Chart component
        function OccupancyBarChart({ distribution }) {
            const categories = ["Standard", "Deluxe", "Suite"];
            const values = categories.map(cat => distribution[cat] || 0);
            const maxValue = Math.max(...values, 4);

            const width = 360;
            const height = 180;
            const paddingLeft = 35;
            const paddingBottom = 25;
            const paddingTop = 15;
            const paddingRight = 10;

            const chartHeight = height - paddingTop - paddingBottom;
            const chartWidth = width - paddingLeft - paddingRight;
            const barWidth = 32;
            const gap = (chartWidth - barWidth * categories.length) / (categories.length + 1);

            const colors = { Standard: "#4A6FA5", Deluxe: "#C5A030", Suite: "#1A325A" };

            return (
                <svg className="w-full h-auto bg-white/10 rounded-2xl border border-[#C5A030]/20 p-2" viewBox={`0 0 ${width} ${height}`}>
                    {[0, 0.5, 1].map((ratio, idx) => {
                        const y = paddingTop + chartHeight * (1 - ratio);
                        const labelVal = Math.round(maxValue * ratio);
                        return (
                            <g key={idx}>
                                <line x1={paddingLeft} y1={y} x2={width - paddingRight} y2={y} stroke="rgba(197, 160, 48, 0.15)" strokeDasharray="3" />
                                <text x={paddingLeft - 8} y={y + 3} fill="#5E6982" fontSize="9" fontWeight="bold" textAnchor="end">{labelVal}</text>
                            </g>
                        );
                    })}
                    {categories.map((cat, idx) => {
                        const value = distribution[cat] || 0;
                        const barHeight = maxValue > 0 ? (value / maxValue) * chartHeight : 0;
                        const x = paddingLeft + gap + idx * (barWidth + gap);
                        const y = height - paddingBottom - barHeight;

                        return (
                            <g key={cat}>
                                <rect x={x} y={y} width={barWidth} height={barHeight} fill={colors[cat]} rx="4" />
                                <text x={x + barWidth / 2} y={y - 4} fill="#1A325A" className="dark:fill-[#F4E4B5]" fontSize="10" fontWeight="extrabold" textAnchor="middle">{value}</text>
                                <text x={x + barWidth / 2} y={height - paddingBottom + 14} fill="#5E6982" fontSize="9" fontWeight="bold" textAnchor="middle">{cat}</text>
                            </g>
                        );
                    })}
                </svg>
            );
        }

        // 360° Draggable Panorama Suite Tour
        function Tour360Viewer({ suiteCategory, onClose }) {
            const [panX, setPanX] = useState(0);
            const isDragging = useRef(false);
            const startX = useRef(0);

            const panoramas = {

        // Royal Concierge AI Bot
        function RoyalConciergeWidget() {
            const [open, setOpen] = useState(false);
            const [messages, setMessages] = useState([
                { sender: "bot", text: "Greetings, noble guest. I am your Royal Concierge. How may I elevate your stay at Luxury today?" }
            ]);
            const [input, setInput] = useState("");
            const [typing, setTyping] = useState(false);

            const streamMessage = (text) => {
                setTyping(true);
                let idx = 0;
                const words = text.split(" ");
                let currentText = "";

                const interval = setInterval(() => {
                    if (idx < words.length) {
                        currentText += (idx === 0 ? "" : " ") + words[idx];
                        setMessages(prev => {
                            const list = prev.slice(0, -1);
                            return [...list, { sender: "bot", text: currentText }];
                        });
                        idx++;
                    } else {
                        clearInterval(interval);
                        setTyping(false);
                    }
                }, 60);
            };

            const handleSend = (e, customText) => {
                if (e) e.preventDefault();
                const queryText = customText || input;
                if (!queryText.trim()) return;

                setMessages(prev => [...prev, { sender: "user", text: queryText }, { sender: "bot", text: "..." }]);
                setInput("");

                setTimeout(() => {
                    let reply = "I am consulting our Royal registry. We offer bespoke standard rooms ($100), deluxe chambers ($180), and palace suites ($350) with premium add-on services.";
                    const query = queryText.toLowerCase();

                    if (query.includes("price") || query.includes("rate") || query.includes("cost")) {
                        reply = "Our palace chambers offer distinct tiers: Standard rooms ($100/night), Deluxe sanctuaries ($180/night), and Imperial Suites ($350/night).";
                    } else if (query.includes("spa") || query.includes("breakfast") || query.includes("perk")) {
                        reply = "Elevate your stay with our Royal Buffet Breakfast ($15/day), Airport Transfer Shuttle ($30 flat), and VIP Wellness Spa Lounge pass ($50 flat).";
                    } else if (query.includes("loyalty") || query.includes("gold") || query.includes("silver") || query.includes("platinum")) {
                        reply = "Earn privileges across Silver, Royal Gold, and Platinum King tiers. Perks include late checkout, butler assistance, and custom spa entries.";
                    }
                    streamMessage(reply);
                }, 500);
            };

            return (
                <div className="fixed bottom-6 right-6 z-40 print-hide">
                    <button 
                        onClick={() => setOpen(!open)}
                        className="w-14 h-14 bg-gradient-to-tr from-[#C5A030] to-[#D9B855] text-white rounded-full flex items-center justify-center shadow-lg hover:scale-105 transition pointer-events-auto"

                        {open ? <span className="text-xl font-bold">✕</span> : "💬"}
                    </button>

                    {open && (
                        <div className="absolute bottom-16 right-0 w-80 sm:w-96 h-[430px] royal-panel border border-[#C5A030]/35 shadow-2xl flex flex-col overflow-hidden pointer-events-auto">

                                <h3 className="font-serif text-lg font-bold tracking-widest">Royal Concierge</h3>
                                <p className="font-cursive text-lg text-[#FFF1C5]">Where Every Stay is a Reign</p>
                            </div>

                            <div className="flex-grow p-4 overflow-y-auto space-y-3 bg-[#FCFAF2]/90">
                                {messages.map((m, idx) => (
                                    <div key={idx} className={`flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`p-3 rounded-2xl max-w-[85%] text-xs shadow-sm ${

                                                ? 'bg-[#1A325A] text-[#FFF1C5] rounded-tr-none' 
                                                : 'bg-white text-[#1F2430] border border-[#C5A030]/20 rounded-tl-none font-serif'
                                        }`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <form onSubmit={(e) => handleSend(e)} className="p-3 bg-white border-t border-[#C5A030]/25 flex gap-2">

            const extraShuttle = shuttle ? 30.0 : 0.0;
            const extraSpa = spa ? 50.0 : 0.0;
            const subtotal = baseCost + extraBuffet + extraShuttle + extraSpa;

            let discount = 0.0;
            if (promo.toUpperCase() === 'ROYAL20') discount = subtotal * 0.2;
            else if (promo.toUpperCase() === 'PALACE10') discount = subtotal * 0.1;
            const grandTotal = subtotal - discount;

            const handlePaySubmit = async (e) => {
                e.preventDefault();
                try {
                    const params = new URLSearchParams();
                    params.append('guestName', guestName || 'Jane Doe');
                    params.append('contact', contact || '+919988776655');
                    params.append('roomNumber', selectedRoomNo);
                    params.append('nights', daysCount.toString());
                    params.append('idType', idType);
                    params.append('idNumber', idNumber || 'PP123456');
                    params.append('breakfast', breakfast.toString());
                    params.append('shuttle', shuttle.toString());
                    params.append('spa', spa.toString());
                    params.append('promoCode', promo);

                    const res = await fetch(`/api/hotel/book?${params.toString()}`, { method: 'POST' });
                    const data = await res.json();
                    if (data.success) {
                        onBookingComplete(data);

                    console.error("Booking failed:", err);

                    <div className="flex gap-4 print-hide">
                        <button onClick={() => window.print()} className="flex-grow py-3 bg-[#1A325A] hover:bg-[#4A6FA5] text-[#FFF1C5] font-bold rounded-xl text-xs transition shadow-md font-serif uppercase tracking-wider font-sans">Print Receipt</button>
                        <button onClick={onDone} className="px-5 py-3 bg-white border border-[#C5A030]/35 text-[#C5A030] hover:bg-[#C5A030]/10 font-bold rounded-xl text-xs transition font-serif uppercase tracking-wider font-sans">Return Home</button>
                    </div>
                </div>
            );
        }

        // Guest Loyalty Dashboard
        function LoyaltyDashboard({ bookings }) {
            const nightsCount = bookings.reduce((sum, b) => sum + b.nights, 0);
            let tier = "Silver Member";
            let progress = 30;
            let perks = ["10% discount on spa amenities", "Free bottled water daily"];
            let badgeColor = "text-slate-400";

            if (nightsCount >= 10) {
                tier = "Platinum King";
                progress = 100;
                perks = ["Private lounge butler entry", "Free late check-out", "Unlimited luxury spa wellness pass"];
                badgeColor = "text-[#C5A030]";
            } else if (nightsCount >= 4) {
                tier = "Royal Gold";
                progress = 65;
                perks = ["Gourmet breakfast upgrades", "Complimentary airport shuttle transfers"];
                badgeColor = "text-[#D9B855]";
            }

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="lg:col-span-1 parchment-book p-6 border border-[#C5A030]/30 space-y-6">
                        <div className="text-center space-y-3">
                            <div className={`text-5xl ${badgeColor} drop-shadow-md`}>👑</div>
                            <h3 className="text-3xl font-serif font-extrabold text-[#1A325A] dark:text-[#F4E4B5]">{tier}</h3>
                            <p className="font-cursive text-2xl text-[#C5A030]">Royal Loyalty Certificate</p>
                        </div>
                        <div className="space-y-2">
                            <div className="flex justify-between text-[10px] font-extrabold text-[#5E6982] dark:text-[#94A3B8] uppercase tracking-wider font-sans">
                                <span>Progress to next tier</span>
                                <span>{nightsCount} night(s) stayed</span>
                            </div>
                            <div className="w-full bg-[#E5EEF9] h-2.5 rounded-full overflow-hidden border border-[#C5A030]/15">
                                <div className="bg-[#C5A030] h-full" style={{ width: `${progress}%` }}></div>
                            </div>
                        </div>
                        <div className="bg-[#FFF1C5]/10 p-4 rounded-2xl border border-[#C5A030]/20 space-y-2 font-serif">
                            <h4 className="text-[10px] font-bold text-[#C5A030] uppercase tracking-widest font-sans border-b border-[#C5A030]/15 pb-1.5 mb-2">Unlocked privileges</h4>
                            <ul className="space-y-1.5 text-xs text-[#1F2430] dark:text-white">
                                {perks.map((p, idx) => <li key={idx} className="flex items-center gap-2"><span className="text-[#C5A030]">✓</span> {p}</li>)}
                            </ul>
                        </div>
                    </div>

                    <div className="lg:col-span-2 parchment-book p-6 border border-[#C5A030]/30 space-y-6">
                        <h3 className="text-xl font-serif font-bold text-[#1A325A] dark:text-[#F4E4B5] border-b border-[#C5A030]/20 pb-2">Active Stays & Registries</h3>
                        {bookings.length === 0 ? (
                            <div className="text-center py-10 text-[#5E6982] dark:text-[#94A3B8] text-xs font-semibold font-serif">No active chamber reservations registered at this hour.</div>
                        ) : (
                            <div className="space-y-4">
                                {bookings.map(b => (
                                    <div key={b.bookingId} className="bg-white/30 p-5 rounded-2xl border border-[#C5A030]/15 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                        <div>
                                            <span className="text-[9px] font-extrabold text-[#C5A030] uppercase tracking-wider font-sans">{b.bookingId}</span>
                                            <h4 className="text-lg font-serif font-extrabold text-[#1A325A] dark:text-[#F4E4B5]">Suite {b.roomNumber}</h4>
                                            <p className="text-xs text-[#5E6982] dark:text-[#94A3B8] mt-0.5">Stay duration: {b.nights} night(s) | Guest: {b.guestName}</p>
                                        </div>
                                        <div className="text-right">
                                            <span className="block text-sm font-extrabold text-[#1A325A] dark:text-[#F4E4B5] font-serif">${b.totalCost?.toFixed(2)}</span>
                                            <span className="inline-block px-2.5 py-0.5 mt-1 rounded-full text-[9px] font-bold uppercase bg-emerald-500/10 text-emerald-600 border border-emerald-500/20 font-sans">Confirmed</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Admin Dashboard
        function AdminDashboard({ rooms, bookings, analytics, onCancelBooking, onAddRoom }) {
            const [selectedTab, setSelectedTab] = useState("bookings");
            const [newRoomNo, setNewRoomNo] = useState("");
            const [newCategory, setNewCategory] = useState("Standard");
            const [newPrice, setNewPrice] = useState("");

            const handleRoomSubmit = (e) => {
                e.preventDefault();
                if (!newRoomNo || !newPrice) return;
                onAddRoom({ roomNumber: parseInt(newRoomNo), category: newCategory, pricePerNight: parseFloat(newPrice) });
                setNewRoomNo("");
                setNewPrice("");
            };

            return (
                <div className="space-y-8">
                    <div className="flex gap-2 border-b border-[#C5A030]/20 pb-2">
                        {["bookings", "inventory", "analytics"].map(tab => (
                            <button 
                                key={tab}
                                onClick={() => setSelectedTab(tab)}
                                className={`px-4 py-2 text-xs font-bold rounded-xl transition uppercase tracking-wider font-serif ${selectedTab === tab ? 'bg-[#1A325A] text-[#FFF1C5]' : 'text-[#5E6982] hover:bg-[#FFF1C5]/30'}`}
                            >
                                {tab}
                            </button>
                        ))}
                    </div>

                    {selectedTab === "bookings" && (
                        <div className="parchment-book p-6 border border-[#C5A030]/30 overflow-hidden">
                            <h3 className="text-2xl font-serif font-bold text-[#1A325A] dark:text-[#F4E4B5] mb-6 border-b border-[#C5A030]/20 pb-2">Reservations Registry</h3>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse font-serif">
                                    <thead>
                                        <tr className="text-[#5E6982] dark:text-[#94A3B8] font-bold text-xs border-b border-[#C5A030]/20 uppercase tracking-wider">
                                            <th className="py-3 px-4">Ref Code</th>
                                            <th className="py-3 px-4">Guest Name</th>
                                            <th className="py-3 px-4">Suite</th>
                                            <th className="py-3 px-4 text-center">Nights</th>
                                            <th className="py-3 px-4 text-center">Total Paid</th>
                                            <th className="py-3 px-4 text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {bookings.map(b => (
                                            <tr key={b.bookingId} className="border-b border-[#C5A030]/10 hover:bg-[#FFF1C5]/10 text-xs">
                                                <td className="py-4 px-4 font-bold text-[#C5A030]">{b.bookingId}</td>
                                                <td className="py-4 px-4 font-semibold text-[#1F2430] dark:text-white font-sans">{b.guestName}</td>
                                                <td className="py-4 px-4 font-extrabold text-[#1A325A] dark:text-[#F4E4B5]">{b.roomNumber}</td>
                                                <td className="py-4 px-4 text-center font-sans">{b.nights}</td>
                                                <td className="py-4 px-4 text-center font-extrabold text-[#1A325A] dark:text-[#F4E4B5]">${b.totalCost?.toFixed(2)}</td>
                                                <td className="py-4 px-4 text-right">
                                                    <button onClick={() => onCancelBooking(b.bookingId)} className="px-3 py-1.5 bg-rose-500/10 text-rose-600 font-bold rounded-lg hover:bg-rose-500/20 text-[10px] uppercase font-sans">Cancel stay</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {selectedTab === "inventory" && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-1 parchment-book p-6 border border-[#C5A030]/30 h-fit">
                                <h3 className="text-xl font-serif font-bold text-[#1A325A] dark:text-[#F4E4B5] border-b border-[#C5A030]/20 pb-2 mb-4">Add Chamber</h3>
                                <form onSubmit={handleRoomSubmit} className="space-y-4">
                                    <div>
                                        <label className="block text-[10px] font-bold text-[#5E6982] dark:text-[#94A3B8] uppercase mb-1 font-sans">Chamber Number</label>
                                        <input type="number" value={newRoomNo} onChange={(e) => setNewRoomNo(e.target.value)} placeholder="e.g. 401" className="w-full gold-input focus:outline-none" required />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-[#5E6982] dark:text-[#94A3B8] uppercase mb-1 font-sans">Category</label>
                                        <select value={newCategory} onChange={(e) => setNewCategory(e.target.value)} className="w-full gold-input focus:outline-none dark:bg-[#1A2436] dark:text-white">
                                            <option value="Standard">Standard</option>
                                            <option value="Deluxe">Deluxe</option>
                                            <option value="Suite">Suite</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-[#5E6982] dark:text-[#94A3B8] uppercase mb-1 font-sans">Price Per Night ($)</label>
                                        <input type="number" value={newPrice} onChange={(e) => setNewPrice(e.target.value)} placeholder="e.g. 200" className="w-full gold-input focus:outline-none" required />
                                    </div>
                                    <button type="submit" className="w-full py-3 bg-[#C5A030] hover:bg-[#D9B855] text-white font-bold rounded-xl text-xs font-serif uppercase tracking-wider shadow-md">Register Suite</button>
                                </form>
                            </div>

                            <div className="lg:col-span-2 parchment-book p-6 border border-[#C5A030]/30">
                                <h3 className="text-xl font-serif font-bold text-[#1A325A] dark:text-[#F4E4B5] border-b border-[#C5A030]/20 pb-2 mb-4">Chamber Registry</h3>
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 h-96 overflow-y-auto pr-2">
                                    {rooms.map(r => (
                                        <div key={r.roomNumber} className="bg-white/30 p-4 rounded-2xl border border-[#C5A030]/15 text-center">
                                            <span className="text-[9px] uppercase tracking-wider font-extrabold text-[#5E6982] dark:text-[#94A3B8] font-sans">{r.category}</span>
                                            <h4 className="text-lg font-serif font-extrabold text-[#1A325A] dark:text-[#F4E4B5] mt-1">Suite {r.roomNumber}</h4>
                                            <p className="text-xs font-bold text-[#C5A030] mt-0.5 font-serif">${r.pricePerNight} / night</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {selectedTab === "analytics" && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-1 space-y-6">
                                <div className="parchment-book p-6 border border-[#C5A030]/30 space-y-4">
                                    <h3 className="text-[10px] font-bold text-[#C5A030] uppercase tracking-widest font-sans border-b border-[#C5A030]/20 pb-2">Financial metrics</h3>
                                    <div className="bg-white/30 p-4 rounded-2xl border border-[#C5A030]/15">
                                        <span className="block text-[10px] text-[#5E6982] dark:text-[#94A3B8] font-bold uppercase tracking-wider mb-1 font-sans">Occupancy Rate</span>
                                        <span className="text-3xl font-serif font-extrabold text-[#1A325A] dark:text-[#F4E4B5]">{analytics.occupancyRate?.toFixed(1)}%</span>
                                    </div>
                                    <div className="bg-white/30 p-4 rounded-2xl border border-[#C5A030]/15">
                                        <span className="block text-[10px] text-[#5E6982] dark:text-[#94A3B8] font-bold uppercase tracking-wider mb-1 font-sans">Gross Revenue</span>
                                        <span className="text-3xl font-serif font-extrabold text-[#1A325A] dark:text-[#F4E4B5]">${analytics.grossRevenue?.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-2 space-y-6">
                                <div className="parchment-book p-6 border border-[#C5A030]/30">
                                    <h3 className="text-sm font-serif font-extrabold text-[#1A325A] dark:text-[#F4E4B5] mb-4">Suite Bookings popularities</h3>
                                    <OccupancyBarChart distribution={analytics.categoryDistribution} />
                                </div>
                                <div className="parchment-book p-6 border border-[#C5A030]/30">
                                    <h3 className="text-sm font-serif font-extrabold text-[#1A325A] dark:text-[#F4E4B5] mb-4">Room Allocation Density</h3>
                                    <AllocationDonut distribution={analytics.categoryDistribution} />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Main App
        function App() {
            const [view, setView] = useState("home");
            const [rooms, setRooms] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [selectedRoomNo, setSelectedRoomNo] = useState("");
            const [activeReceipt, setActiveReceipt] = useState(null);
            const [tourCategory, setTourCategory] = useState(null);

            // Dark Mode
            const [darkMode, setDarkMode] = useState(false);
            const toggleTheme = () => {
                setDarkMode(!darkMode);
                document.body.classList.toggle("dark-theme");
            };

            const [analytics, setAnalytics] = useState({
                totalRooms: 0,
                occupiedRooms: 0,
                occupancyRate: 0.0,
                grossRevenue: 0.0,
                categoryDistribution: { Standard: 0, Deluxe: 0, Suite: 0 }
            });

            useEffect(() => {
                fetchInitialData();
            }, []);

            const fetchInitialData = async () => {
                try {
                    const roomsRes = await fetch('/api/hotel/rooms');
                    const roomsData = await roomsRes.json();
                    setRooms(roomsData);

                    const bookingsRes = await fetch('/api/hotel/bookings');
                    const bookingsData = await bookingsRes.json();
                    setBookings(bookingsData);

                    const analyticsRes = await fetch('/api/hotel/analytics');
                    const analyticsData = await analyticsRes.json();
                    setAnalytics(analyticsData);
                } catch (err) {
                    console.error("Error loading hotel details:", err);
                }
            };

            const handleRoomSelect = (roomNo) => {
                setSelectedRoomNo(roomNo.toString());
            };

            const handleBookingComplete = (data) => {
                setActiveReceipt(data);
                setSelectedRoomNo("");
                fetchInitialData();
                setView("receipt");
            };

            const handleCancelBooking = async (bookingId) => {
                if (!window.confirm(`Are you sure you want to cancel booking: ${bookingId}?`)) return;
                try {
                    await fetch(`/api/hotel/cancel/${bookingId}`, { method: 'DELETE' });
                    fetchInitialData();
                } catch (err) {
                    console.error("Error cancelling booking:", err);
                }
            };

            const handleAddRoom = async (roomObj) => {
                setRooms(prev => [...prev, roomObj]);
                alert("Room successfully registered!");
            };

            return (
                <div className="max-w-6xl mx-auto flex-grow flex flex-col pt-24 md:pt-36 pb-12 px-14 md:px-32 lg:px-44 space-y-8 z-10 relative">
                    
                    {/* Header frosted glass navbar */}
                    <div className="glass-navbar rounded-3xl p-6 flex flex-col md:flex-row items-center justify-between gap-4 print-hide">
                        <div className="text-center md:text-left cursor-pointer pointer-events-auto flex items-center gap-3 select-none" onClick={() => setView("home")}>
                            {/* Royal Crest Monogram Logo */}
                            <svg className="w-12 h-12" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="42" stroke="url(#goldSilkGrad1)" strokeWidth="1.5" strokeDasharray="3 3" />
                                <circle cx="50" cy="50" r="38" stroke="url(#goldSilkGrad1)" strokeWidth="1" />
                                {/* Crown Path */}
                                <path d="M35 42 L42 48 L50 36 L58 48 L65 42 L62 58 L38 58 Z" fill="url(#goldSilkGrad2)" />
                                <circle cx="35" cy="40" r="1.5" fill="#FFF1C5" />
                                <circle cx="50" cy="34" r="1.5" fill="#FFF1C5" />
                                <circle cx="65" cy="40" r="1.5" fill="#FFF1C5" />
                                {/* Letter L Monogram */}
                                <path d="M46 68 H58 V64 H50 V48 H46 Z" fill="#FFF1C5" />
                            </svg>
                            <div>
                                <h1 className="text-2xl font-serif font-extrabold tracking-[0.25em] text-[#1A325A] dark:text-[#F4E4B5] leading-none">LUXURY</h1>
                                <span className="font-cursive text-lg text-[#C5A030] tracking-wide mt-1.5 block">Where Every Stay is a Reign</span>
                            </div>
                        </div>

                        <div className="flex flex-wrap gap-2 md:gap-4 items-center pointer-events-auto">
                            <button onClick={() => setView("home")} className={`px-4 py-2 font-bold rounded-xl transition duration-200 text-xs font-serif uppercase tracking-wider ${view === 'home' ? 'bg-[#1A325A] text-[#FFF1C5] shadow-md border border-[#C5A030]/20' : 'text-[#5E6982] hover:bg-[#FFF1C5]/30'}`}>Lobby</button>
                            <button onClick={() => setView("explorer")} className={`px-4 py-2 font-bold rounded-xl transition duration-200 text-xs font-serif uppercase tracking-wider ${view === 'explorer' ? 'bg-[#1A325A] text-[#FFF1C5] shadow-md border border-[#C5A030]/20' : 'text-[#5E6982] hover:bg-[#FFF1C5]/30'}`}>Chamber Grid</button>
                            <button onClick={() => setView("loyalty")} className={`px-4 py-2 font-bold rounded-xl transition duration-200 text-xs font-serif uppercase tracking-wider ${view === 'loyalty' ? 'bg-[#1A325A] text-[#FFF1C5] shadow-md border border-[#C5A030]/20' : 'text-[#5E6982] hover:bg-[#FFF1C5]/30'}`}>Guest Directory</button>
                            <button onClick={() => setView("admin")} className={`px-4 py-2 font-bold rounded-xl transition duration-200 text-xs font-serif uppercase tracking-wider ${view === 'admin' ? 'bg-[#1A325A] text-[#FFF1C5] shadow-md border border-[#C5A030]/20' : 'text-[#5E6982] hover:bg-[#FFF1C5]/30'}`}>Manager Console</button>
                            
                            <button onClick={toggleTheme} className="w-8 h-8 rounded-full border border-[#C5A030]/35 flex items-center justify-center text-sm bg-white shadow-inner">{darkMode ? '☀️' : '🌙'}</button>
                        </div>
                    </div>

                    {/* Page Content Viewport */}
                    <div className="flex-grow">
                        {view === "home" && <HomeView onExploreClick={() => setView("explorer")} />}
                        {view === "explorer" && <ExplorerView rooms={rooms} bookings={bookings} selectedRoomNo={selectedRoomNo} onRoomSelect={handleRoomSelect} onBookClick={() => setView("booking")} onLaunchTour={(cat) => setTourCategory(cat)} />}
                        {view === "booking" && <BookingWizard rooms={rooms} selectedRoomNo={selectedRoomNo} bookings={bookings} onBookingComplete={handleBookingComplete} />}
                        {view === "receipt" && activeReceipt && <BookingConfirmation bookingData={activeReceipt} onDone={() => setView("home")} />}
                        {view === "loyalty" && <LoyaltyDashboard bookings={bookings} />}
                        {view === "admin" && <AdminDashboard rooms={rooms} bookings={bookings} analytics={analytics} onCancelBooking={handleCancelBooking} onAddRoom={handleAddRoom} />}
                    </div>

                    {tourCategory && <Tour360Viewer suiteCategory={tourCategory} onClose={() => setTourCategory(null)} />}
                    <RoyalConciergeWidget />
                </div>
            );
        }

    </script>
</body>
</html>
