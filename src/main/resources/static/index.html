<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxura - Premium Hotel Reservation Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script>
      Babel.registerPreset("custom-react", {
        presets: [
          [Babel.availablePresets["react"], { runtime: "classic" }]
        ]
      });
    </script>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #090d16 0%, #02040a 100%);
            color: #f3f4f6;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.65);
        }
        .glow-indigo {
            text-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4">
    <div id="root"></div>

    <script type="text/babel" data-presets="custom-react">
        const { useState, useEffect } = React;

        function App() {
            const [rooms, setRooms] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [activeTab, setActiveTab] = useState('catalog');
            const [filterCategory, setFilterCategory] = useState('All');
            
            // Booking form fields
            const [guestName, setGuestName] = useState('');
            const [contact, setContact] = useState('');
            const [selectedRoomNo, setSelectedRoomNo] = useState('');
            const [nights, setNights] = useState('1');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetchInitialData();
            }, []);

            const fetchInitialData = async () => {
                try {
                    const roomsRes = await fetch('/api/hotel/rooms');
                    const roomsData = await roomsRes.json();
                    setRooms(roomsData);

                    const bookingsRes = await fetch('/api/hotel/bookings');
                    const bookingsData = await bookingsRes.json();
                    setBookings(bookingsData);

                    setLoading(false);
                } catch (err) {
                    console.error("Error loading hotel details:", err);
                    setLoading(false);
                }
            };

            const isRoomBooked = (roomNo) => {
                return bookings.some(b => b.roomNumber === roomNo);
            };

            const handleRoomSelect = (roomNo, price, category) => {
                if (isRoomBooked(roomNo)) return;
                setSelectedRoomNo(roomNo);
            };

            const handleBook = async (e) => {
                e.preventDefault();
                if (!guestName.trim() || !contact.trim() || !selectedRoomNo || !nights.trim()) {
                    alert("Please select an available room and fill in all fields.");
                    return;
                }

                const qtyNights = parseInt(nights);
                if (isNaN(qtyNights) || qtyNights <= 0) {
                    alert("Duration must be 1 night or more.");
                    return;
                }

                const selectedRoom = rooms.find(r => r.roomNumber === parseInt(selectedRoomNo));
                const totalCost = selectedRoom.pricePerNight * qtyNights;

                const confirm = window.confirm(
                    `Confirm Reservation Invoice:\n\n` +
                    `Room Number: ${selectedRoomNo}\n` +
                    `Category: ${selectedRoom.category}\n` +
                    `Rate: $${selectedRoom.pricePerNight}/night\n` +
                    `Stay: ${qtyNights} night(s)\n` +
                    `Total Cost: $${totalCost.toFixed(2)}\n\n` +
                    `Proceed to pay?`
                );

                if (!confirm) return;

                try {
                    const params = new URLSearchParams();
                    params.append('guestName', guestName.trim());
                    params.append('contact', contact.trim());
                    params.append('roomNumber', selectedRoomNo);
                    params.append('nights', qtyNights);

                    const res = await fetch(`/api/hotel/book?${params.toString()}`, {
                        method: 'POST'
                    });
                    const data = await res.json();

                    if (data.success) {
                        alert(`Booking Confirmed!\nReference Code: ${data.bookingId}`);
                        setGuestName('');
                        setContact('');
                        setSelectedRoomNo('');
                        setNights('1');
                        fetchInitialData();
                        setActiveTab('reservations');
                    } else {
                        alert(data.message);
                    }
                } catch (err) {
                    console.error("Error booking room:", err);
                }
            };

            const handleCancel = async (bookingId) => {
                if (!window.confirm(`Are you sure you want to cancel booking: ${bookingId}?`)) return;

                try {
                    const res = await fetch(`/api/hotel/cancel/${bookingId}`, {
                        method: 'DELETE'
                    });
                    const data = await res.json();
                    alert(data.message);
                    fetchInitialData();
                } catch (err) {
                    console.error("Error cancelling booking:", err);
                }
            };

            if (loading) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500"></div>
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto">
                    {/* Header */}
                    <div className="glass-panel rounded-3xl p-8 mb-8 text-center border-t border-indigo-500/20">
                        <h1 className="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-indigo-400 mb-2">LUXURA FRONT DESK</h1>
                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-widest">Premium Booking & Reservation Portal</p>
                    </div>

                    {/* Navigation Tabs */}
                    <div className="flex space-x-4 mb-8">
                        <button 
                            onClick={() => setActiveTab('catalog')}
                            className={`px-6 py-3 font-bold rounded-xl transition duration-200 shadow-lg ${activeTab === 'catalog' ? 'bg-indigo-600 text-white shadow-indigo-600/25' : 'glass-panel text-slate-300 hover:bg-slate-800/40'}`}
                        >
                            Room Directory & Booking
                        </button>
                        <button 
                            onClick={() => setActiveTab('reservations')}
                            className={`px-6 py-3 font-bold rounded-xl transition duration-200 shadow-lg ${activeTab === 'reservations' ? 'bg-indigo-600 text-white shadow-indigo-600/25' : 'glass-panel text-slate-300 hover:bg-slate-800/40'}`}
                        >
                            Guest Directory ({bookings.length})
                        </button>
                    </div>

                    {/* View Switch */}
                    {activeTab === 'catalog' ? (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* Room Catalog (2 Cols) */}
                            <div className="glass-panel rounded-2xl p-6 lg:col-span-2 border-t border-slate-800">
                                <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6 pb-2 border-b border-slate-800">
                                    <h2 className="text-lg font-bold text-indigo-300 mb-2 sm:mb-0">Rooms Status Grid</h2>
                                    <div className="flex items-center space-x-2 text-sm">
                                        <span className="font-semibold text-slate-400">Filter Category:</span>
                                        <select 
                                            value={filterCategory}
                                            onChange={(e) => setFilterCategory(e.target.value)}
                                            className="px-3 py-1.5 bg-slate-900/60 border border-slate-800 rounded-lg focus:outline-none text-slate-200 font-medium"
                                        >
                                            <option value="All" className="bg-slate-950">All Categories</option>
                                            <option value="Standard" className="bg-slate-950">Standard ($100)</option>
                                            <option value="Deluxe" className="bg-slate-950">Deluxe ($180)</option>
                                            <option value="Suite" className="bg-slate-950">Suite ($350)</option>
                                        </select>
                                    </div>
                                </div>

                                {/* Room Grid Cards */}
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                                    {rooms
                                        .filter(r => filterCategory === 'All' || r.category === filterCategory)
                                        .map((r) => {
                                            const booked = isRoomBooked(r.roomNumber);
                                            const isSelected = selectedRoomNo === r.roomNumber.toString();
                                            return (
                                                <div 
                                                    key={r.roomNumber}
                                                    onClick={() => handleRoomSelect(r.roomNumber, r.pricePerNight, r.category)}
                                                    className={`p-4 rounded-xl border text-center transition cursor-pointer relative ${
                                                        booked 
                                                            ? 'bg-rose-500/10 border-rose-500/20 text-rose-300/40 cursor-not-allowed opacity-50' 
                                                            : isSelected 
                                                                ? 'bg-indigo-600 border-indigo-600 text-white shadow-lg shadow-indigo-600/30' 
                                                                : 'bg-slate-900/60 hover:bg-slate-800/40 border-slate-800 text-slate-200'
                                                    }`}
                                                >
                                                    <div className="text-[10px] uppercase tracking-wider font-bold mb-1 opacity-70">{r.category}</div>
                                                    <div className="text-2xl font-extrabold mb-1">Room {r.roomNumber}</div>
                                                    <div className="text-xs font-bold opacity-80">${r.pricePerNight}/night</div>
                                                    <div className="mt-3">
                                                        <span className={`inline-block px-2.5 py-0.5 rounded-full text-[9px] font-extrabold uppercase ${
                                                            booked 
                                                                ? 'bg-rose-500/20 text-rose-400' 
                                                                : isSelected 
                                                                    ? 'bg-white/20 text-white' 
                                                                    : 'bg-emerald-500/20 text-emerald-400'
                                                        }`}>
                                                            {booked ? 'Booked' : isSelected ? 'Selected' : 'Available'}
                                                        </span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                </div>
                            </div>

                            {/* Booking checkout form (1 Col) */}
                            <div className="glass-panel rounded-2xl p-6 h-fit border-t border-slate-800">
                                <h2 className="text-lg font-bold text-indigo-300 mb-6 pb-2 border-b border-slate-800">Reserve Room</h2>
                                <form onSubmit={handleBook} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Guest Name</label>
                                        <input 
                                            type="text"
                                            value={guestName}
                                            onChange={(e) => setGuestName(e.target.value)}
                                            placeholder="e.g. Jane Smith"
                                            className="w-full px-4 py-2.5 bg-slate-900/60 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100 placeholder-slate-500"
                                            required
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Contact Number</label>
                                        <input 
                                            type="tel"
                                            value={contact}
                                            onChange={(e) => setContact(e.target.value)}
                                            placeholder="e.g. +91 9876543210"
                                            className="w-full px-4 py-2.5 bg-slate-900/60 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100 placeholder-slate-500"
                                            required
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Selected Room</label>
                                        <input 
                                            type="text"
                                            value={selectedRoomNo}
                                            placeholder="Select available room"
                                            className="w-full px-4 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-indigo-400 font-bold focus:outline-none"
                                            readOnly
                                            required
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Length of Stay (Nights)</label>
                                        <input 
                                            type="number"
                                            value={nights}
                                            onChange={(e) => setNights(e.target.value)}
                                            min="1"
                                            className="w-full px-4 py-2.5 bg-slate-900/60 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100"
                                            required
                                        />
                                    </div>
                                    <button 
                                        type="submit"
                                        className="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-500 transition duration-200 shadow-lg shadow-indigo-600/25 focus:outline-none"
                                    >
                                        Confirm Reservation
                                    </button>
                                </form>
                            </div>
                        </div>
                    ) : (
                        // Tab 2: Booking Management Table
                        <div className="glass-panel rounded-2xl p-6 border-t border-slate-800">
                            <h2 className="text-lg font-bold text-indigo-300 mb-6 pb-2 border-b border-slate-800">Active Bookings Directory</h2>
                            {bookings.length === 0 ? (
                                <div className="text-center py-10 text-slate-500 font-medium">No active guest bookings found.</div>
                            ) : (
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="text-slate-400 font-semibold text-xs border-b border-slate-800/80 uppercase tracking-wider">
                                                <th className="py-3 px-4">Booking Ref</th>
                                                <th className="py-3 px-4">Guest Name</th>
                                                <th className="py-3 px-4">Contact</th>
                                                <th className="py-3 px-4 text-center">Room No</th>
                                                <th className="py-3 px-4 text-center">Nights</th>
                                                <th className="py-3 px-4 text-center">Invoice Total</th>
                                                <th className="py-3 px-4 text-right">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {bookings.map((b) => (
                                                <tr key={b.bookingId} className="border-b border-slate-800/50 hover:bg-slate-800/30 transition">
                                                    <td className="py-4 px-4 font-extrabold text-indigo-400">{b.bookingId}</td>
                                                    <td className="py-4 px-4 font-bold text-slate-200">{b.guestName}</td>
                                                    <td className="py-4 px-4 text-slate-400 text-sm">{b.contact}</td>
                                                    <td className="py-4 px-4 text-center font-bold text-slate-300">{b.roomNumber}</td>
                                                    <td className="py-4 px-4 text-center text-slate-300 font-semibold">{b.nights}</td>
                                                    <td className="py-4 px-4 text-center font-extrabold text-indigo-300">${b.totalCost.toFixed(2)}</td>
                                                    <td className="py-4 px-4 text-right">
                                                        <button 
                                                            onClick={() => handleCancel(b.bookingId)}
                                                            className="px-3.5 py-1.5 bg-rose-500/10 text-rose-400 font-bold rounded-lg hover:bg-rose-500/20 transition text-xs"
                                                        >
                                                            Cancel
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
