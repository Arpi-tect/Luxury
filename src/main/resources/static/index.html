<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxura - Premium Hotel Reservation Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script>
      Babel.registerPreset("custom-react", {
        presets: [
          [Babel.availablePresets["react"], { runtime: "classic" }]
        ]
      });
    </script>
    <!-- Google Identity Services (OAuth) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #090d16 0%, #02040a 100%);
            color: #f3f4f6;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.65);
        }
        .glow-indigo {
            text-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }
        /* Custom styles for printing receipts cleanly */
        @media print {
            body * {
                visibility: hidden;
            }
            #print-area, #print-area * {
                visibility: visible;
            }
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                color: #000000 !important;
                background: #ffffff !important;
            }
            /* Style fixes for printable paper view */
            .print-clean {
                border: 1px solid #e2e8f0 !important;
                padding: 2rem !important;
                border-radius: 0.5rem !important;
                box-shadow: none !important;
                background-color: #ffffff !important;
                color: #1e293b !important;
            }
            .print-hide {
                display: none !important;
            }
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4">
    <div id="root"></div>

    <script type="text/babel" data-presets="custom-react">
        const { useState, useEffect } = React;

        // JWT decoder helper for Google Sign-In Token
        function decodeJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                console.error("JWT decoding failed:", e);
                return null;
            }
        }

        // SVG Interactive Bar Chart for Room Categories popular booking distributions
        function PopularityChart({ distribution }) {
            const categories = ["Standard", "Deluxe", "Suite"];
            const values = categories.map(cat => distribution[cat] || 0);
            const maxValue = Math.max(...values, 4); // Min ceiling of 4 for better display scaling

            const width = 400;
            const height = 220;
            const paddingLeft = 45;
            const paddingBottom = 35;
            const paddingTop = 25;
            const paddingRight = 20;

            const chartHeight = height - paddingTop - paddingBottom;
            const chartWidth = width - paddingLeft - paddingRight;

            const barWidth = 45;
            const gap = (chartWidth - barWidth * categories.length) / (categories.length + 1);

            const colors = {
                Standard: "#38bdf8", // cyan
                Deluxe: "#6366f1",  // indigo
                Suite: "#a855f7"    // purple
            };

            return (
                <svg className="w-full h-auto bg-slate-950/40 rounded-2xl border border-slate-800/80 p-2" viewBox={`0 0 ${width} ${height}`}>
                    {/* Horizontal grid lines */}
                    {[0, 0.25, 0.5, 0.75, 1].map((ratio, idx) => {
                        const y = paddingTop + chartHeight * (1 - ratio);
                        const labelVal = Math.round(maxValue * ratio);
                        return (
                            <g key={idx}>
                                <line x1={paddingLeft} y1={y} x2={width - paddingRight} y2={y} stroke="rgba(255,255,255,0.05)" strokeDasharray="3" />
                                <text x={paddingLeft - 8} y={y + 3} fill="#64748b" fontSize="8" fontWeight="bold" textAnchor="end">{labelVal}</text>
                            </g>
                        );
                    })}

                    {/* Bars */}
                    {categories.map((cat, idx) => {
                        const value = distribution[cat] || 0;
                        const barHeight = maxValue > 0 ? (value / maxValue) * chartHeight : 0;
                        const x = paddingLeft + gap + idx * (barWidth + gap);
                        const y = height - paddingBottom - barHeight;

                        return (
                            <g key={cat} className="group">
                                {/* Bar rect */}
                                <rect 
                                    x={x} 
                                    y={y} 
                                    width={barWidth} 
                                    height={barHeight} 
                                    fill={colors[cat]} 
                                    rx="5"
                                    className="transition-all duration-300 hover:opacity-85"
                                />
                                {/* Value text above bar */}
                                <text 
                                    x={x + barWidth / 2} 
                                    y={y - 6} 
                                    fill="#f1f5f9" 
                                    fontSize="10" 
                                    fontWeight="extrabold" 
                                    textAnchor="middle"
                                >
                                    {value}
                                </text>
                                {/* Category label below bar */}
                                <text 
                                    x={x + barWidth / 2} 
                                    y={height - paddingBottom + 16} 
                                    fill="#94a3b8" 
                                    fontSize="10" 
                                    fontWeight="bold" 
                                    textAnchor="middle"
                                >
                                    {cat}
                                </text>
                            </g>
                        );
                    })}
                </svg>
            );
        }

        // Receipt Printable Invoice Modal
        function ReceiptModal({ booking, roomDetails, onClose }) {
            if (!booking) return null;

            const roomCategory = roomDetails?.category || "Standard";
            const roomRate = roomDetails?.pricePerNight || 0.0;
            
            const roomTotal = roomRate * booking.nights;
            const breakfastTotal = booking.breakfast ? 15.0 * booking.nights : 0.0;
            const shuttleTotal = booking.shuttle ? 30.0 : 0.0;
            const spaTotal = booking.spa ? 50.0 : 0.0;

            const handlePrint = () => {
                window.print();
            };

            return (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-filter backdrop-blur-md flex items-center justify-center p-4 z-50 overflow-y-auto">
                    <div className="glass-panel max-w-lg w-full rounded-2xl border border-slate-800 p-8 shadow-2xl relative print-clean" id="print-area">
                        <button 
                            onClick={onClose} 
                            className="absolute top-4 right-4 text-slate-500 hover:text-slate-300 font-bold text-lg print-hide"
                        >
                            ✕
                        </button>
                        
                        {/* Hotel Header */}
                        <div className="text-center border-b border-slate-800 pb-4 mb-6">
                            <h2 className="text-xl font-extrabold tracking-wider text-slate-100 uppercase">LUXURA HOTEL & RESORTS</h2>
                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Guest Reservation Receipt</p>
                        </div>

                        {/* Guest details */}
                        <div className="grid grid-cols-2 gap-4 text-xs mb-6 text-slate-300">
                            <div>
                                <span className="block text-slate-500 font-bold uppercase tracking-wider text-[9px]">Guest Name</span>
                                <span className="font-extrabold text-sm text-slate-200">{booking.guestName}</span>
                            </div>
                            <div>
                                <span className="block text-slate-500 font-bold uppercase tracking-wider text-[9px]">Booking Reference</span>
                                <span className="font-extrabold text-sm text-indigo-400">{booking.bookingId}</span>
                            </div>
                            <div>
                                <span className="block text-slate-500 font-bold uppercase tracking-wider text-[9px]">Verification ID</span>
                                <span className="font-bold">{booking.idType} ({booking.idNumber})</span>
                            </div>
                            <div>
                                <span className="block text-slate-500 font-bold uppercase tracking-wider text-[9px]">Contact Info</span>
                                <span className="font-bold">{booking.contact}</span>
                            </div>
                        </div>

                        {/* Reservation stay summary */}
                        <div className="bg-slate-900/60 p-4 rounded-xl border border-slate-800/80 text-xs mb-6 space-y-2">
                            <div className="flex justify-between">
                                <span className="font-bold text-slate-400">Room Assignment:</span>
                                <span className="font-extrabold text-slate-200">Room {booking.roomNumber} ({roomCategory})</span>
                            </div>
                            <div className="flex justify-between">
                                <span className="font-bold text-slate-400">Length of Stay:</span>
                                <span className="font-extrabold text-slate-200">{booking.nights} night(s)</span>
                            </div>
                        </div>

                        {/* Charges breakdown */}
                        <h4 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 border-b border-slate-900 pb-1.5">Invoice Itemization</h4>
                        <div className="space-y-2 text-xs mb-8">
                            <div className="flex justify-between">
                                <span className="text-slate-400">Base Room Cost ({booking.nights} nights @ ${roomRate}/night)</span>
                                <span className="font-bold text-slate-200">${roomTotal.toFixed(2)}</span>
                            </div>
                            {booking.breakfast && (
                                <div className="flex justify-between">
                                    <span className="text-slate-400">Add-on: Breakfast Buffet (${booking.nights} nights @ $15/night)</span>
                                    <span className="font-bold text-slate-200">${breakfastTotal.toFixed(2)}</span>
                                </div>
                            )}
                            {booking.shuttle && (
                                <div className="flex justify-between">
                                    <span className="text-slate-400">Add-on: Airport Shuttle (Flat Rate)</span>
                                    <span className="font-bold text-slate-200">${shuttleTotal.toFixed(2)}</span>
                                </div>
                            )}
                            {booking.spa && (
                                <div className="flex justify-between">
                                    <span className="text-slate-400">Add-on: Spa Lounge Access (Flat Rate)</span>
                                    <span className="font-bold text-slate-200">${spaTotal.toFixed(2)}</span>
                                </div>
                            )}
                            <div className="flex justify-between border-t border-slate-800 pt-3 mt-3">
                                <span className="text-sm font-extrabold text-slate-300">Total Invoice Paid</span>
                                <span className="text-lg font-extrabold text-indigo-400">${booking.totalCost.toFixed(2)}</span>
                            </div>
                        </div>

                        {/* Print Buttons */}
                        <div className="flex gap-4 print-hide">
                            <button 
                                onClick={handlePrint}
                                className="flex-grow py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition duration-200 shadow-lg shadow-indigo-600/25 flex items-center justify-center gap-2"
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                                </svg>
                                Print Receipt
                            </button>
                            <button 
                                onClick={onClose}
                                className="px-5 py-3 bg-slate-900 border border-slate-850 hover:bg-slate-800 text-slate-400 font-bold rounded-xl transition"
                            >
                                Close
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function Login({ onLogin }) {
            const handleGuestLogin = () => {
                onLogin({
                    name: "Guest Desk Clerk",
                    email: "frontdesk@luxurahotel.com",
                    picture: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&q=80",
                    isGuest: true
                });
            };

            useEffect(() => {
                window.handleCredentialResponse = (response) => {
                    const user = decodeJwt(response.credential);
                    if (user) {
                        onLogin({
                            name: user.name,
                            email: user.email,
                            picture: user.picture,
                            isGuest: false
                        });
                    }
                };
            }, [onLogin]);

            return (
                <div className="flex items-center justify-center min-h-[85vh] px-4">
                    <div className="glass-panel rounded-3xl p-10 max-w-md w-full border-t border-indigo-500/20 text-center relative overflow-hidden">
                        <div className="absolute -top-24 -left-24 w-48 h-48 bg-indigo-500/10 rounded-full blur-3xl"></div>
                        <div className="absolute -bottom-24 -right-24 w-48 h-48 bg-purple-500/10 rounded-full blur-3xl"></div>

                        <div className="w-16 h-16 bg-gradient-to-tr from-violet-500 to-indigo-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-500/20">
                            <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                            </svg>
                        </div>

                        <h1 className="text-2xl font-extrabold tracking-wider text-slate-100 mb-2">LUXURA</h1>
                        <p className="text-xs text-slate-400 mb-8 font-semibold tracking-wider">Premium Booking & Reservation Portal</p>

                        <div className="space-y-4">
                            <div className="flex justify-center">
                                <div id="g_id_onload"
                                     data-client_id="855919652758-om1b3kpg3hbfbfl4b5o89s56oas58fl7.apps.googleusercontent.com"
                                     data-context="signin"
                                     data-ux_mode="popup"
                                     data-callback="handleCredentialResponse"
                                     data-auto_prompt="false">
                                </div>
                                <div className="g_id_signin"
                                     data-type="standard"
                                     data-shape="pill"
                                     data-theme="filled_black"
                                     data-text="signin_with"
                                     data-size="large"
                                     data-logo_alignment="left">
                                </div>
                            </div>

                            <div className="flex items-center my-4">
                                <div className="flex-grow border-t border-slate-800"></div>
                                <span className="mx-4 text-xs text-slate-500 font-bold uppercase tracking-wider">or</span>
                                <div className="flex-grow border-t border-slate-800"></div>
                            </div>

                            <button 
                                onClick={handleGuestLogin}
                                className="w-full py-3 bg-slate-900 border border-slate-800 text-slate-200 font-bold rounded-full hover:bg-slate-800 transition duration-200 shadow-md hover:border-slate-700 flex items-center justify-center gap-2"
                            >
                                <svg className="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                                Continue as Guest
                            </button>
                        </div>

                        <div className="mt-8 text-[11px] text-slate-500 leading-relaxed">
                            Sign in to manage real-time room categories, book stays, checkout reservations, and issue bills.
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [userProfile, setUserProfile] = useState(null);

            const [rooms, setRooms] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [activeTab, setActiveTab] = useState('catalog'); // catalog | reservations | analytics
            const [filterCategory, setFilterCategory] = useState('All');
            
            // Booking form fields
            const [guestName, setGuestName] = useState('');
            const [contact, setContact] = useState('');
            const [selectedRoomNo, setSelectedRoomNo] = useState('');
            const [nights, setNights] = useState('1');
            const [idType, setIdType] = useState('Passport');
            const [idNumber, setIdNumber] = useState('');

            // Add-on service flags
            const [breakfast, setBreakfast] = useState(false);
            const [shuttle, setShuttle] = useState(false);
            const [spa, setSpa] = useState(false);

            // Analytics metrics
            const [analytics, setAnalytics] = useState({
                totalRooms: 0,
                occupiedRooms: 0,
                occupancyRate: 0.0,
                grossRevenue: 0.0,
                revPar: 0.0,
                categoryDistribution: { Standard: 0, Deluxe: 0, Suite: 0 }
            });

            // Receipt modal holder
            const [activeReceipt, setActiveReceipt] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const session = localStorage.getItem("apex_hotel_session");
                if (session) {
                    const profile = JSON.parse(session);
                    setUserProfile(profile);
                    setIsLoggedIn(true);
                }
                fetchInitialData();
            }, []);

            const fetchInitialData = async () => {
                try {
                    const roomsRes = await fetch('/api/hotel/rooms');
                    const roomsData = await roomsRes.json();
                    setRooms(roomsData);

                    const bookingsRes = await fetch('/api/hotel/bookings');
                    const bookingsData = await bookingsRes.json();
                    setBookings(bookingsData);

                    const analyticsRes = await fetch('/api/hotel/analytics');
                    const analyticsData = await analyticsRes.json();
                    setAnalytics(analyticsData);

                    setLoading(false);
                } catch (err) {
                    console.error("Error loading hotel details:", err);
                    setLoading(false);
                }
            };

            const isRoomBooked = (roomNo) => {
                return bookings.some(b => b.roomNumber === roomNo);
            };

            const handleRoomSelect = (roomNo) => {
                if (isRoomBooked(roomNo)) return;
                setSelectedRoomNo(roomNo.toString());
            };

            const handleLogin = (profile) => {
                setUserProfile(profile);
                setIsLoggedIn(true);
                localStorage.setItem("apex_hotel_session", JSON.stringify(profile));
            };

            const handleSignOut = () => {
                setUserProfile(null);
                setIsLoggedIn(false);
                localStorage.removeItem("apex_hotel_session");
            };

            const handleBook = async (e) => {
                e.preventDefault();
                if (!guestName.trim() || !contact.trim() || !selectedRoomNo || !nights.trim() || !idNumber.trim()) {
                    alert("Please select an available room and fill in all fields (including verification ID).");
                    return;
                }

                const qtyNights = parseInt(nights);
                if (isNaN(qtyNights) || qtyNights <= 0) {
                    alert("Duration must be 1 night or more.");
                    return;
                }

                const selectedRoom = rooms.find(r => r.roomNumber === parseInt(selectedRoomNo));
                const roomRate = selectedRoom?.pricePerNight || 0;
                
                const roomCost = roomRate * qtyNights;
                const breakfastCost = breakfast ? 15.0 * qtyNights : 0.0;
                const shuttleCost = shuttle ? 30.0 : 0.0;
                const spaCost = spa ? 50.0 : 0.0;
                const grandTotal = roomCost + breakfastCost + shuttleCost + spaCost;

                const confirm = window.confirm(
                    `Confirm Reservation Details & Invoice:\n\n` +
                    `Room: ${selectedRoomNo} (${selectedRoom?.category})\n` +
                    `Rate: $${roomRate}/night for ${qtyNights} night(s)\n\n` +
                    `Invoice Breakdown:\n` +
                    `- Base Stay Charges: $${roomCost.toFixed(2)}\n` +
                    `- Breakfast Buffet add-on: $${breakfastCost.toFixed(2)}\n` +
                    `- Shuttle Pick-up add-on: $${shuttleCost.toFixed(2)}\n` +
                    `- VIP Spa Lounge add-on: $${spaCost.toFixed(2)}\n\n` +
                    `Total Due: $${grandTotal.toFixed(2)}\n\n` +
                    `Proceed with booking?`
                );

                if (!confirm) return;

                try {
                    const params = new URLSearchParams();
                    params.append('guestName', guestName.trim());
                    params.append('contact', contact.trim());
                    params.append('roomNumber', selectedRoomNo);
                    params.append('nights', qtyNights);
                    params.append('idType', idType);
                    params.append('idNumber', idNumber.trim());
                    params.append('breakfast', breakfast.toString());
                    params.append('shuttle', shuttle.toString());
                    params.append('spa', spa.toString());

                    const res = await fetch(`/api/hotel/book?${params.toString()}`, {
                        method: 'POST'
                    });
                    const data = await res.json();

                    if (data.success) {
                        alert(`Booking Confirmed!\nReference Code: ${data.bookingId}`);
                        
                        // Clear form state
                        setGuestName('');
                        setContact('');
                        setSelectedRoomNo('');
                        setNights('1');
                        setIdNumber('');
                        setBreakfast(false);
                        setShuttle(false);
                        setSpa(false);

                        // Reload data
                        await fetchInitialData();
                        setActiveTab('reservations');
                    } else {
                        alert(data.message);
                    }
                } catch (err) {
                    console.error("Error booking room:", err);
                }
            };

            const handleCancel = async (bookingId) => {
                if (!window.confirm(`Are you sure you want to cancel booking: ${bookingId}?`)) return;

                try {
                    const res = await fetch(`/api/hotel/cancel/${bookingId}`, {
                        method: 'DELETE'
                    });
                    const data = await res.json();
                    alert(data.message);
                    fetchInitialData();
                } catch (err) {
                    console.error("Error cancelling booking:", err);
                }
            };

            if (!isLoggedIn) {
                return <Login onLogin={handleLogin} />;
            }

            if (loading) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500"></div>
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto">
                    {/* Header */}
                    <div className="glass-panel rounded-3xl p-6 mb-8 flex flex-col md:flex-row items-center justify-between gap-4 border-t border-indigo-500/20 print-hide">
                        <div className="text-center md:text-left">
                            <h1 className="text-2xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-indigo-400">LUXURA FRONT DESK</h1>
                            <p className="text-[10px] font-semibold text-slate-400 uppercase tracking-widest">Premium Booking & Reservation Portal</p>
                        </div>
                        
                        <div className="flex items-center gap-4 bg-slate-950/40 px-4 py-2.5 rounded-2xl border border-slate-800/80">
                            <img src={userProfile.picture} referrerPolicy="no-referrer" className="w-8 h-8 rounded-full border border-indigo-500/30 object-cover" />
                            <div className="text-left">
                                <div className="text-xs font-bold text-slate-200 leading-tight">{userProfile.name}</div>
                                <div className="text-[9px] text-slate-500 leading-tight">{userProfile.email}</div>
                            </div>
                            <button 
                                onClick={handleSignOut}
                                className="ml-2 text-[10px] font-bold text-rose-400 bg-rose-500/10 hover:bg-rose-500/20 px-2.5 py-1.5 rounded-lg transition"
                            >
                                Sign Out
                            </button>
                        </div>
                    </div>

                    {/* Navigation Tabs */}
                    <div className="flex flex-wrap gap-4 mb-8 print-hide">
                        <button 
                            onClick={() => setActiveTab('catalog')}
                            className={`px-6 py-3 font-bold rounded-xl transition duration-200 shadow-lg ${activeTab === 'catalog' ? 'bg-indigo-600 text-white shadow-indigo-600/25' : 'glass-panel text-slate-300 hover:bg-slate-800/40'}`}
                        >
                            Room Grid & Booking
                        </button>
                        <button 
                            onClick={() => setActiveTab('reservations')}
                            className={`px-6 py-3 font-bold rounded-xl transition duration-200 shadow-lg ${activeTab === 'reservations' ? 'bg-indigo-600 text-white shadow-indigo-600/25' : 'glass-panel text-slate-300 hover:bg-slate-800/40'}`}
                        >
                            Guest Directory ({bookings.length})
                        </button>
                        <button 
                            onClick={() => setActiveTab('analytics')}
                            className={`px-6 py-3 font-bold rounded-xl transition duration-200 shadow-lg ${activeTab === 'analytics' ? 'bg-indigo-600 text-white shadow-indigo-600/25' : 'glass-panel text-slate-300 hover:bg-slate-800/40'}`}
                        >
                            Manager Analytics
                        </button>
                    </div>

                    {/* Tab Switch Viewports */}
                    <div className="print-hide">
                        {/* Tab 1: Catalog & Booking */}
                        {activeTab === 'catalog' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                {/* Room Catalog Status Grid (2 Cols) */}
                                <div className="glass-panel rounded-2xl p-6 lg:col-span-2 border-t border-slate-800">
                                    <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6 pb-2 border-b border-slate-800">
                                        <h2 className="text-lg font-bold text-indigo-300 mb-2 sm:mb-0">Rooms Status Grid</h2>
                                        <div className="flex items-center space-x-2 text-sm">
                                            <span className="font-semibold text-slate-400">Filter Category:</span>
                                            <select 
                                                value={filterCategory}
                                                onChange={(e) => setFilterCategory(e.target.value)}
                                                className="px-3 py-1.5 bg-slate-900/60 border border-slate-800 rounded-lg focus:outline-none text-slate-200 font-medium"
                                            >
                                                <option value="All" className="bg-slate-950">All Categories</option>
                                                <option value="Standard" className="bg-slate-950">Standard ($100)</option>
                                                <option value="Deluxe" className="bg-slate-950">Deluxe ($180)</option>
                                                <option value="Suite" className="bg-slate-950">Suite ($350)</option>
                                            </select>
                                        </div>
                                    </div>

                                    {/* Room Grid Cards */}
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                                        {rooms
                                            .filter(r => filterCategory === 'All' || r.category === filterCategory)
                                            .map((r) => {
                                                const booked = isRoomBooked(r.roomNumber);
                                                const isSelected = selectedRoomNo === r.roomNumber.toString();
                                                return (
                                                    <div 
                                                        key={r.roomNumber}
                                                        onClick={() => handleRoomSelect(r.roomNumber)}
                                                        className={`p-4 rounded-xl border text-center transition cursor-pointer relative ${
                                                            booked 
                                                                ? 'bg-rose-500/10 border-rose-500/20 text-rose-300/40 cursor-not-allowed opacity-50' 
                                                                : isSelected 
                                                                    ? 'bg-indigo-600 border-indigo-600 text-white shadow-lg shadow-indigo-600/30' 
                                                                    : 'bg-slate-900/60 hover:bg-slate-800/40 border-slate-800 text-slate-200'
                                                        }`}
                                                    >
                                                        <div className="text-[10px] uppercase tracking-wider font-bold mb-1 opacity-70">{r.category}</div>
                                                        <div className="text-2xl font-extrabold mb-1">Room {r.roomNumber}</div>
                                                        <div className="text-xs font-bold opacity-80">${r.pricePerNight}/night</div>
                                                        <div className="mt-3">
                                                            <span className={`inline-block px-2.5 py-0.5 rounded-full text-[9px] font-extrabold uppercase ${
                                                                booked 
                                                                    ? 'bg-rose-500/20 text-rose-400' 
                                                                    : isSelected 
                                                                        ? 'bg-white/20 text-white' 
                                                                        : 'bg-emerald-500/20 text-emerald-400'
                                                            }`}>
                                                                {booked ? 'Booked' : isSelected ? 'Selected' : 'Available'}
                                                            </span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                    </div>
                                </div>

                                {/* Booking checkout form (1 Col) */}
                                <div className="glass-panel rounded-2xl p-6 h-fit border-t border-slate-800">
                                    <h2 className="text-lg font-bold text-indigo-300 mb-6 pb-2 border-b border-slate-800">Reserve Room</h2>
                                    <form onSubmit={handleBook} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">Guest Name</label>
                                            <input 
                                                type="text"
                                                value={guestName}
                                                onChange={(e) => setGuestName(e.target.value)}
                                                placeholder="e.g. Jane Smith"
                                                className="w-full px-4 py-2.5 bg-slate-900/60 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100 placeholder-slate-500"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">Contact Number</label>
                                            <input 
                                                type="tel"
                                                value={contact}
                                                onChange={(e) => setContact(e.target.value)}
                                                placeholder="e.g. +91 9876543210"
                                                className="w-full px-4 py-2.5 bg-slate-900/60 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100 placeholder-slate-500"
                                                required
                                            />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">Verification ID</label>
                                                <select
                                                    value={idType}
                                                    onChange={(e) => setIdType(e.target.value)}
                                                    className="w-full px-4 py-2.5 bg-slate-900/60 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-200 font-semibold"
                                                >
                                                    <option value="Passport" className="bg-slate-950">Passport</option>
                                                    <option value="National ID" className="bg-slate-950">National ID</option>
                                                    <option value="Driver's License" className="bg-slate-950">Driver's License</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">Document Number</label>
                                                <input 
                                                    type="text"
                                                    value={idNumber}
                                                    onChange={(e) => setIdNumber(e.target.value)}
                                                    placeholder="A1234567B"
                                                    className="w-full px-4 py-2.5 bg-slate-900/60 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100 placeholder-slate-500"
                                                    required
                                                />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">Selected Room</label>
                                                <input 
                                                    type="text"
                                                    value={selectedRoomNo}
                                                    placeholder="Select room"
                                                    className="w-full px-4 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-indigo-400 font-bold text-center focus:outline-none"
                                                    readOnly
                                                    required
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">Duration (Nights)</label>
                                                <input 
                                                    type="number"
                                                    value={nights}
                                                    onChange={(e) => setNights(e.target.value)}
                                                    min="1"
                                                    className="w-full px-4 py-2.5 bg-slate-900/60 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100 font-bold text-center"
                                                    required
                                                />
                                            </div>
                                        </div>
                                        
                                        {/* Add-on services checklist */}
                                        <div className="bg-slate-950/45 p-4 rounded-xl border border-slate-800/80 space-y-2">
                                            <h4 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest border-b border-slate-900 pb-1.5 mb-2">Enhance Guest Stay (Add-ons)</h4>
                                            
                                            <label className="flex items-center justify-between cursor-pointer group text-xs text-slate-300">
                                                <span className="font-semibold group-hover:text-slate-200">Breakfast Buffet (+$15/day)</span>
                                                <input 
                                                    type="checkbox"
                                                    checked={breakfast}
                                                    onChange={(e) => setBreakfast(e.target.checked)}
                                                    className="w-4 h-4 rounded text-indigo-600 bg-slate-900 border-slate-800 focus:ring-indigo-500 focus:ring-offset-0 focus:ring-0"
                                                />
                                            </label>

                                            <label className="flex items-center justify-between cursor-pointer group text-xs text-slate-300">
                                                <span className="font-semibold group-hover:text-slate-200">Airport Shuttle pickup (+$30 flat)</span>
                                                <input 
                                                    type="checkbox"
                                                    checked={shuttle}
                                                    onChange={(e) => setShuttle(e.target.checked)}
                                                    className="w-4 h-4 rounded text-indigo-600 bg-slate-900 border-slate-800 focus:ring-indigo-500 focus:ring-offset-0 focus:ring-0"
                                                />
                                            </label>

                                            <label className="flex items-center justify-between cursor-pointer group text-xs text-slate-300">
                                                <span className="font-semibold group-hover:text-slate-200">VIP Lounge & Spa Access (+$50 flat)</span>
                                                <input 
                                                    type="checkbox"
                                                    checked={spa}
                                                    onChange={(e) => setSpa(e.target.checked)}
                                                    className="w-4 h-4 rounded text-indigo-600 bg-slate-900 border-slate-800 focus:ring-indigo-500 focus:ring-offset-0 focus:ring-0"
                                                />
                                            </label>
                                        </div>

                                        <button 
                                            type="submit"
                                            className="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-500 transition duration-200 shadow-lg shadow-indigo-600/25 focus:outline-none"
                                        >
                                            Confirm Reservation
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Tab 2: Guest Directory */}
                        {activeTab === 'reservations' && (
                            <div className="glass-panel rounded-2xl p-6 border-t border-slate-800">
                                <h2 className="text-lg font-bold text-indigo-300 mb-6 pb-2 border-b border-slate-800">Active Bookings Directory</h2>
                                {bookings.length === 0 ? (
                                    <div className="text-center py-10 text-slate-500 font-medium">No active guest bookings found.</div>
                                ) : (
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="text-slate-400 font-semibold text-xs border-b border-slate-800/80 uppercase tracking-wider">
                                                    <th className="py-3 px-4">Booking Ref</th>
                                                    <th className="py-3 px-4">Guest Name</th>
                                                    <th className="py-3 px-4">ID Reference</th>
                                                    <th className="py-3 px-4 text-center">Room</th>
                                                    <th className="py-3 px-4 text-center">Nights</th>
                                                    <th className="py-3 px-4 text-center">Invoice Total</th>
                                                    <th className="py-3 px-4 text-right">Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {bookings.map((b) => (
                                                    <tr key={b.bookingId} className="border-b border-slate-800/50 hover:bg-slate-800/30 transition">
                                                        <td className="py-4 px-4 font-extrabold text-indigo-400">{b.bookingId}</td>
                                                        <td className="py-4 px-4 font-bold text-slate-200">
                                                            <div>{b.guestName}</div>
                                                            <div className="text-[10px] text-slate-500 font-normal">{b.contact}</div>
                                                        </td>
                                                        <td className="py-4 px-4 text-slate-400 text-xs">
                                                            <span className="font-semibold text-slate-300">{b.idType}</span>
                                                            <span className="block text-[10px] opacity-75">{b.idNumber}</span>
                                                        </td>
                                                        <td className="py-4 px-4 text-center font-bold text-slate-300">{b.roomNumber}</td>
                                                        <td className="py-4 px-4 text-center text-slate-300 font-semibold">{b.nights}</td>
                                                        <td className="py-4 px-4 text-center font-extrabold text-indigo-300">${b.totalCost.toFixed(2)}</td>
                                                        <td className="py-4 px-4 text-right space-x-2">
                                                            <button 
                                                                onClick={() => setActiveReceipt(b)}
                                                                className="px-3.5 py-1.5 bg-indigo-500/10 text-indigo-400 font-bold rounded-lg hover:bg-indigo-500/20 transition text-xs"
                                                            >
                                                                Invoice Receipt
                                                            </button>
                                                            <button 
                                                                onClick={() => handleCancel(b.bookingId)}
                                                                className="px-3.5 py-1.5 bg-rose-500/10 text-rose-400 font-bold rounded-lg hover:bg-rose-500/20 transition text-xs"
                                                            >
                                                                Cancel
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Tab 3: Manager Analytics */}
                        {activeTab === 'analytics' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                {/* Performance Dashboard stats */}
                                <div className="lg:col-span-1 space-y-6">
                                    <div className="glass-panel rounded-2xl p-6 border-t border-slate-800">
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Operations Metrics</h3>
                                        
                                        <div className="space-y-4">
                                            <div className="bg-slate-900/60 p-4 rounded-xl border border-slate-850">
                                                <span className="block text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1">Occupancy Rate</span>
                                                <div className="flex items-baseline gap-2">
                                                    <span className="text-3xl font-extrabold text-indigo-400">{analytics.occupancyRate.toFixed(1)}%</span>
                                                    <span className="text-xs text-slate-400">({analytics.occupiedRooms} / {analytics.totalRooms} rooms)</span>
                                                </div>
                                                <div className="w-full bg-slate-950 rounded-full h-2.5 mt-3 overflow-hidden border border-slate-800">
                                                    <div className="bg-indigo-500 h-full transition-all duration-500" style={{ width: `${analytics.occupancyRate}%` }}></div>
                                                </div>
                                            </div>

                                            <div className="bg-slate-900/60 p-4 rounded-xl border border-slate-850">
                                                <span className="block text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1">Gross Revenue</span>
                                                <span className="text-3xl font-extrabold text-slate-200">${analytics.grossRevenue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                                            </div>

                                            <div className="bg-slate-900/60 p-4 rounded-xl border border-slate-850">
                                                <span className="block text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1">Revenue per Available Room (RevPAR)</span>
                                                <span className="text-3xl font-extrabold text-slate-200">${analytics.revPar.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Popularity chart */}
                                <div className="glass-panel rounded-2xl p-6 lg:col-span-2 border-t border-slate-800 flex flex-col justify-between">
                                    <div>
                                        <h2 className="text-lg font-bold text-indigo-300 mb-2">Category Booking Popularity</h2>
                                        <p className="text-[10px] text-slate-500 uppercase font-semibold mb-6">Distribution count of active reservations by room tier</p>
                                    </div>
                                    <PopularityChart distribution={analytics.categoryDistribution} />
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Receipt print area overlay */}
                    {activeReceipt && (
                        <ReceiptModal 
                            booking={activeReceipt}
                            roomDetails={rooms.find(r => r.roomNumber === activeReceipt.roomNumber)}
                            onClose={() => setActiveReceipt(null)}
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
