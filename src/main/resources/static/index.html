<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury — Premium Hotel Reservation System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script>
      Babel.registerPreset("custom-react", {
        presets: [
          [Babel.availablePresets["react"], { runtime: "classic" }]
        ]
      });
    </script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --royal-blue-deep: #2C4875;
            --royal-blue: #5B7FB5;
            --royal-blue-light: #A9C0E0;
            --royal-blue-mist: #DCE6F4;
            --gold-primary: #D4AF37;
            --gold-soft: #E8C97A;
            --gold-light: #F6EBC8;
            --gold-shine: #FFE9A8;
            --ivory-white: #FDFBF6;
            --pearl-white: #FFFFFF;
            --text-dark: #2A2E3A;
            --text-muted: #6E7791;
            
            --bg-canvas: var(--ivory-white);
            --bg-card: var(--pearl-white);
            --border-panel: rgba(212, 175, 55, 0.16);
            --shadow-panel: rgba(44, 72, 117, 0.08);
            --text-main: var(--text-dark);
        }

        .dark-theme {
            --bg-canvas: #151A26;
            --bg-card: #1C2333;
            --border-panel: rgba(232, 201, 122, 0.2);
            --shadow-panel: rgba(0, 0, 0, 0.25);
            --text-main: #E2E8F0;
            --text-muted: #94A3B8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        h1, h2, h3, h4, .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }

        /* Glassmorphism panels - extremely light and frosted */
        .glass-panel {
            background: rgba(255, 255, 255, 0.76);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-panel);
            box-shadow: 0 10px 30px -10px var(--shadow-panel);
            transition: background 0.3s, border 0.3s, box-shadow 0.3s;
        }

        .dark-theme .glass-panel {
            background: rgba(28, 35, 51, 0.85);
            border: 1px solid var(--border-panel);
            box-shadow: 0 10px 30px -10px var(--shadow-panel);
        }

        .glass-navbar {
            background: rgba(253, 251, 246, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-panel);
        }

        .dark-theme .glass-navbar {
            background: rgba(21, 26, 38, 0.85);
        }

        /* Custom sway keyframes for ambient golden curtains */
        @keyframes sway-fold-1 {
            0%, 100% { transform: translateX(0px) skewX(0deg) scaleX(1); }
            50% { transform: translateX(4px) skewX(0.5deg) scaleX(1.01); }
        }
        @keyframes sway-fold-2 {
            0%, 100% { transform: translateX(0px) skewX(0deg) scaleX(1); }
            50% { transform: translateX(-3px) skewX(-0.4deg) scaleX(0.99); }
        }
        @keyframes sway-fold-3 {
            0%, 100% { transform: translateX(0px) skewX(0deg) scaleX(1); }
            50% { transform: translateX(5px) skewX(0.6deg) scaleX(1.02); }
        }
        @keyframes shimmer-gold {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .fold-1 {
            animation: sway-fold-1 12s ease-in-out infinite;
            transform-origin: top left;
        }
        .fold-2 {
            animation: sway-fold-2 15s ease-in-out infinite;
            transform-origin: top right;
        }
        .fold-3 {
            animation: sway-fold-3 10s ease-in-out infinite;
            transform-origin: top left;
        }

        /* 3D Credit Card Flipping Animation */
        .flip-card {
            background-color: transparent;
            perspective: 1000px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 1rem;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }

        /* 3D Card Hover Tilt */
        .card-tilt {
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            transform-style: preserve-3d;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(44, 72, 117, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold-primary);
            border-radius: 3px;
        }

        @media print {
            body * {
                visibility: hidden;
            }
            #print-area, #print-area * {
                visibility: visible;
            }
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                color: #000000 !important;
                background: #ffffff !important;
            }
        }
    </style>
</head>
<body class="min-h-screen relative flex flex-col">

    <!-- Global SVG definitions for golden silk curtain gradients -->
    <svg class="hidden">
        <defs>
            <linearGradient id="goldSilkGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#D4AF37" />
                <stop offset="50%" stop-color="#FFE9A8" />
                <stop offset="100%" stop-color="#AA7C11" />
            </linearGradient>
            <linearGradient id="goldSilkGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#AA7C11" />
                <stop offset="30%" stop-color="#E8C97A" />
                <stop offset="70%" stop-color="#FFE9A8" />
                <stop offset="100%" stop-color="#8A6605" />
            </linearGradient>
            <linearGradient id="goldSilkGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#8A6605" />
                <stop offset="40%" stop-color="#D4AF37" />
                <stop offset="80%" stop-color="#FFE9A8" />
                <stop offset="100%" stop-color="#B8860B" />
            </linearGradient>
        </defs>
    </svg>

    <!-- Signature Background Ambient Curtains (Perpetual wind-blown sway, never close) -->
    <div class="fixed left-0 top-0 bottom-0 w-16 md:w-24 pointer-events-none z-0 opacity-75 filter blur-[0.6px] print-hide">
        <svg class="w-full h-full" viewBox="0 0 100 1000" preserveAspectRatio="none">
            <path class="curtain-fold fold-1" d="M0,0 Q35,120 12,280 T25,550 T18,800 T0,1000 L0,1000 Z" fill="url(#goldSilkGrad1)" />
            <path class="curtain-fold fold-2" d="M0,0 Q45,170 25,380 T35,750 T12,1000 L0,1000 Z" fill="url(#goldSilkGrad2)" />
            <path class="curtain-fold fold-3" d="M0,0 Q55,220 18,480 T45,850 T0,1000 L0,1000 Z" fill="url(#goldSilkGrad3)" />
            <!-- Gold fringe details at bottom hem -->
            <path d="M0,995 L30,995 L30,1000 L0,1000 Z" fill="#FFE9A8" opacity="0.9" />
            <path d="M30,997 L60,997 L60,1000 L30,1000 Z" fill="#D4AF37" opacity="0.9" />
        </svg>
    </div>
    <div class="fixed right-0 top-0 bottom-0 w-16 md:w-24 pointer-events-none z-0 opacity-75 filter blur-[0.6px] transform scale-x-[-1] print-hide">
        <svg class="w-full h-full" viewBox="0 0 100 1000" preserveAspectRatio="none">
            <path class="curtain-fold fold-1" d="M0,0 Q35,120 12,280 T25,550 T18,800 T0,1000 L0,1000 Z" fill="url(#goldSilkGrad1)" />
            <path class="curtain-fold fold-2" d="M0,0 Q45,170 25,380 T35,750 T12,1000 L0,1000 Z" fill="url(#goldSilkGrad2)" />
            <path class="curtain-fold fold-3" d="M0,0 Q55,220 18,480 T45,850 T0,1000 L0,1000 Z" fill="url(#goldSilkGrad3)" />
            <!-- Gold fringe details at bottom hem -->
            <path d="M0,995 L30,995 L30,1000 L0,1000 Z" fill="#FFE9A8" opacity="0.9" />
            <path d="M30,997 L60,997 L60,1000 L30,1000 Z" fill="#D4AF37" opacity="0.9" />
        </svg>
    </div>

    <!-- Main React App Mounting Target -->
    <div id="root" class="flex-grow flex flex-col z-10"></div>

    <script type="text/babel" data-presets="custom-react">
        const { useState, useEffect, useRef } = React;

        // Custom Card Tilt Hook for 3D Parallax effect
        function useTilt() {
            const ref = useRef(null);
            const handleMouseMove = (e) => {
                if (!ref.current) return;
                const card = ref.current;
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const xc = rect.width / 2;
                const yc = rect.height / 2;
                const angleX = (yc - y) / 15; // deg
                const angleY = (x - xc) / 15; // deg
                card.style.transform = `perspective(600px) rotateX(${angleX}deg) rotateY(${angleY}deg)`;
            };
            const handleMouseLeave = () => {
                if (!ref.current) return;
                ref.current.style.transform = 'perspective(600px) rotateX(0deg) rotateY(0deg)';
            };
            return { ref, onMouseMove: handleMouseMove, onMouseLeave: handleMouseLeave };
        }

        // SVG Donut Chart component for Occupancy Allocation
        function DonutChart({ distribution }) {
            const categories = ["Standard", "Deluxe", "Suite"];
            const values = categories.map(cat => distribution[cat] || 0);
            const total = values.reduce((a, b) => a + b, 0);

            let accumulatedPercent = 0;
            const colors = ["#5B7FB5", "#D4AF37", "#2C4875"];

            if (total === 0) {
                return (
                    <div className="flex items-center justify-center h-48 text-[#6E7791] text-xs font-semibold">
                        No active booking allocations.
                    </div>
                );
            }

            return (
                <div className="flex flex-col sm:flex-row items-center justify-around gap-4 p-4 bg-white/70 rounded-2xl border border-[#D4AF37]/15">
                    <svg className="w-36 h-36" viewBox="0 0 42 42">
                        <circle cx="21" cy="21" r="15.915" fill="transparent" stroke="#E2E8F0" strokeWidth="4" />
                        {categories.map((cat, idx) => {
                            const val = distribution[cat] || 0;
                            const percent = (val / total) * 100;
                            if (percent === 0) return null;
                            const strokeDasharray = `${percent} ${100 - percent}`;
                            const strokeDashoffset = 100 - accumulatedPercent + 25;
                            accumulatedPercent += percent;

                            return (
                                <circle 
                                    key={cat}
                                    cx="21" 
                                    cy="21" 
                                    r="15.915" 
                                    fill="transparent" 
                                    stroke={colors[idx]} 
                                    strokeWidth="4" 
                                    strokeDasharray={strokeDasharray}
                                    strokeDashoffset={strokeDashoffset}
                                    className="transition-all duration-500"
                                />
                            );
                        })}
                    </svg>
                    <div className="space-y-2 text-xs">
                        {categories.map((cat, idx) => (
                            <div key={cat} className="flex items-center gap-2">
                                <span className="w-3 h-3 rounded-full" style={{ backgroundColor: colors[idx] }}></span>
                                <span className="font-semibold text-[#2C4875]">{cat}:</span>
                                <span className="font-extrabold text-[#D4AF37]">{distribution[cat] || 0} ({Math.round(((distribution[cat] || 0)/total)*100)}%)</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // SVG Bar Chart component
        function OccupancyChart({ distribution }) {
            const categories = ["Standard", "Deluxe", "Suite"];
            const values = categories.map(cat => distribution[cat] || 0);
            const maxValue = Math.max(...values, 4);

            const width = 380;
            const height = 200;
            const paddingLeft = 40;
            const paddingBottom = 30;
            const paddingTop = 20;
            const paddingRight = 10;

            const chartHeight = height - paddingTop - paddingBottom;
            const chartWidth = width - paddingLeft - paddingRight;
            const barWidth = 35;
            const gap = (chartWidth - barWidth * categories.length) / (categories.length + 1);

            const colors = {
                Standard: "#5B7FB5",
                Deluxe: "#D4AF37",
                Suite: "#2C4875"
            };

            return (
                <svg className="w-full h-auto bg-white/70 rounded-2xl border border-[#D4AF37]/15 p-2 shadow-inner" viewBox={`0 0 ${width} ${height}`}>
                    {[0, 0.25, 0.5, 0.75, 1].map((ratio, idx) => {
                        const y = paddingTop + chartHeight * (1 - ratio);
                        const labelVal = Math.round(maxValue * ratio);
                        return (
                            <g key={idx}>
                                <line x1={paddingLeft} y1={y} x2={width - paddingRight} y2={y} stroke="rgba(44, 72, 117, 0.08)" strokeDasharray="3" />
                                <text x={paddingLeft - 8} y={y + 3} fill="#6E7791" fontSize="9" fontWeight="bold" textAnchor="end">{labelVal}</text>
                            </g>
                        );
                    })}
                    {categories.map((cat, idx) => {
                        const value = distribution[cat] || 0;
                        const barHeight = maxValue > 0 ? (value / maxValue) * chartHeight : 0;
                        const x = paddingLeft + gap + idx * (barWidth + gap);
                        const y = height - paddingBottom - barHeight;

                        return (
                            <g key={cat}>
                                <rect 
                                    x={x} 
                                    y={y} 
                                    width={barWidth} 
                                    height={barHeight} 
                                    fill={colors[cat]} 
                                    rx="4"
                                    className="transition-all duration-300 cursor-pointer"
                                />
                                <text x={x + barWidth / 2} y={y - 5} fill="#2C4875" fontSize="10" fontWeight="extrabold" textAnchor="middle">{value}</text>
                                <text x={x + barWidth / 2} y={height - paddingBottom + 16} fill="#6E7791" fontSize="10" fontWeight="bold" textAnchor="middle">{cat}</text>
                            </g>
                        );
                    })}
                </svg>
            );
        }

        // Custom 360° virtual suite tour pan viewer
        function Virtual360Tour({ suiteCategory, onClose }) {
            const [panX, setPanX] = useState(0);
            const isDragging = useRef(false);
            const startX = useRef(0);

            // Wide panoramic image mapping per suite category
            const panoramaUrls = {
                Standard: "https://images.unsplash.com/photo-1590490360182-c33d57733427?auto=format&fit=crop&w=1800&q=80",
                Deluxe: "https://images.unsplash.com/photo-1618773928121-c32242e63f39?auto=format&fit=crop&w=1800&q=80",
                Suite: "https://images.unsplash.com/photo-1582719478250-c89cae4db85b?auto=format&fit=crop&w=1800&q=80"
            };

            const url = panoramaUrls[suiteCategory] || panoramaUrls.Standard;

            const handleMouseDown = (e) => {
                isDragging.current = true;
                startX.current = e.clientX - panX;
            };

            const handleMouseMove = (e) => {
                if (!isDragging.current) return;
                const newPan = e.clientX - startX.current;
                // Limit panning boundaries so image stays filled
                setPanX(Math.max(-500, Math.min(0, newPan)));
            };

            const handleMouseUp = () => {
                isDragging.current = false;
            };

            return (
                <div className="fixed inset-0 bg-[#2C4875]/80 backdrop-blur-md flex items-center justify-center p-4 z-50">
                    <div className="bg-[#FDFBF6] max-w-4xl w-full rounded-3xl border-2 border-[#D4AF37]/35 overflow-hidden shadow-2xl relative">
                        <div className="bg-[#2C4875] text-white p-4 flex items-center justify-between">
                            <div>
                                <h3 className="text-xl font-serif font-bold tracking-widest uppercase">360° Virtual Suite Explorer</h3>
                                <p className="text-[10px] text-[#FFE9A8] uppercase tracking-widest font-semibold">Click and drag horizontally to pan the chamber interior</p>
                            </div>
                            <button onClick={onClose} className="bg-white/10 hover:bg-white/20 p-2 rounded-full font-bold">✕</button>
                        </div>
                        
                        {/* Interactive Drag Window */}
                        <div 
                            onMouseDown={handleMouseDown}
                            onMouseMove={handleMouseMove}
                            onMouseUp={handleMouseUp}
                            onMouseLeave={handleMouseUp}
                            className="relative h-96 overflow-hidden cursor-move bg-black select-none"
                        >
                            <img 
                                src={url} 
                                alt="Suite Panorama" 
                                className="absolute top-0 h-full max-w-none transition-transform duration-75"
                                style={{ 
                                    transform: `translateX(${panX}px)`,
                                    width: '180%' 
                                }}
                            />
                            
                            {/* Interactive hotspots */}
                            <div 
                                className="absolute top-1/3 left-1/4 group cursor-pointer"
                                style={{ transform: `translateX(${panX * 0.4}px)` }}
                                onClick={() => alert("Royal Canopy Bed: Hypoallergenic Egyptian cotton sheets with down duvet.")}
                            >
                                <span className="absolute inline-flex h-4 w-4 rounded-full bg-[#D4AF37] opacity-75 animate-ping"></span>
                                <span className="relative inline-flex rounded-full h-4 w-4 bg-[#D4AF37]/90 text-white font-extrabold text-[9px] items-center justify-center border border-white">i</span>
                                <div className="absolute left-6 top-0 hidden group-hover:block bg-white text-[#2C4875] text-[10px] p-2 rounded-md shadow-md font-bold whitespace-nowrap">Canopy King Bed</div>
                            </div>

                            <div 
                                className="absolute top-1/2 left-2/3 group cursor-pointer"
                                style={{ transform: `translateX(${panX * 0.4}px)` }}
                                onClick={() => alert("Spa Hot Tub: Private balcony hydrotherapy tub facing local heritage landmarks.")}
                            >
                                <span className="absolute inline-flex h-4 w-4 rounded-full bg-[#D4AF37] opacity-75 animate-ping"></span>
                                <span className="relative inline-flex rounded-full h-4 w-4 bg-[#D4AF37]/90 text-white font-extrabold text-[9px] items-center justify-center border border-white">i</span>
                                <div className="absolute left-6 top-0 hidden group-hover:block bg-white text-[#2C4875] text-[10px] p-2 rounded-md shadow-md font-bold whitespace-nowrap">Private Balcony Spa Tub</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Royal Concierge AI Bot Widget with streaming & triggers
        function RoyalConcierge({ currentView, onSuiteSelect }) {
            const [open, setOpen] = useState(false);
            const [messages, setMessages] = useState([
                { sender: "bot", text: "Greetings, valued guest. I am your Royal Concierge. How may I elevate your stay at Luxury today?" }
            ]);
            const [input, setInput] = useState("");
            const [typing, setTyping] = useState(false);

            // Stream response token by token
            const streamMessage = (text) => {
                setTyping(true);
                let currentWordIndex = 0;
                const words = text.split(" ");
                let streamingText = "";

                const interval = setInterval(() => {
                    if (currentWordIndex < words.length) {
                        streamingText += (currentWordIndex === 0 ? "" : " ") + words[currentWordIndex];
                        setMessages(prev => {
                            const withoutLast = prev.slice(0, -1);
                            return [...withoutLast, { sender: "bot", text: streamingText }];
                        });
                        currentWordIndex++;
                    } else {
                        clearInterval(interval);
                        setTyping(false);
                    }
                }, 80);
            };

            const handleSend = (e, customText) => {
                if (e) e.preventDefault();
                const queryText = customText || input;
                if (!queryText.trim()) return;

                const userMsg = { sender: "user", text: queryText };
                setMessages(prev => [...prev, userMsg, { sender: "bot", text: "..." }]);
                setInput("");

                setTimeout(() => {
                    let replyText = "I am consulting our Royal registry. We offer bespoke standard rooms ($100), deluxe chambers ($180), and palace suites ($350) with premium add-on services. How can I assist you with your booking?";
                    const query = queryText.toLowerCase();

                    if (query.includes("room") || query.includes("suite") || query.includes("price")) {
                        replyText = "Our Royal Suites feature breathtaking view options. Standard chambers are $100/night, Deluxe suites are $180/night, and our master Palace Suites are $350/night.";
                    } else if (query.includes("spa") || query.includes("breakfast") || query.includes("shuttle") || query.includes("add-on")) {
                        replyText = "Certainly. You can enhance your reservation with our Gourmet Breakfast ($15/night), Airport Shuttle Transfer ($30 flat), and VIP Spa Lounge Access ($50 flat).";
                    } else if (query.includes("loyalty") || query.includes("points") || query.includes("tier")) {
                        replyText = "Our Royal Loyalty system features Silver, Gold, and Platinum tiers. As you book nights, you accumulate points to unlock custom spa amenities, room upgrades, and late checkout features.";
                    } else if (query.includes("cancel") || query.includes("refund")) {
                        replyText = "Cancellations made prior to 24 hours of check-in are eligible for a full instant refund. You can manage and cancel any stay from the Guest Directory tab.";
                    }

                    streamMessage(replyText);
                }, 600);
            };

            const chips = [
                { label: "Show Room Rates", query: "What are the room rates?" },
                { label: "Loyalty Benefits", query: "What are the loyalty tiers?" },
                { label: "Dining & Spa info", query: "Tell me about the spa add-ons." }
            ];

            return (
                <div className="fixed bottom-6 right-6 z-40 print-hide">
                    {/* Toggle button */}
                    <button 
                        onClick={() => setOpen(!open)}
                        className="w-14 h-14 bg-gradient-to-tr from-[#D4AF37] to-[#E8C97A] text-white rounded-full flex items-center justify-center shadow-lg hover:scale-105 transition-transform duration-200"
                    >
                        {open ? (
                            <span className="text-xl font-bold">✕</span>
                        ) : (
                            <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M8.25 21v-4.875c0-.621.504-1.125 1.125-1.125h5.25c.621 0 1.125.504 1.125 1.125V21m0 0h4.5V3.545M2.25 21h1.5m18 0h-18M2.25 9l4.5-1.636M18.75 3l-1.5.545m0 6.545v3m-3-6.545h.008M21 21V3.545M3 21V9.545M12 6.75h.008M12 9.75h.008M12 12.75h.008M12 15.75h.008" />
                            </svg>
                        )}
                    </button>

                    {/* Chat Window */}
                    {open && (
                        <div className="absolute bottom-16 right-0 w-80 sm:w-96 h-[440px] glass-panel rounded-3xl border border-[#D4AF37]/30 shadow-2xl flex flex-col overflow-hidden">
                            <div className="bg-gradient-to-r from-[#2C4875] to-[#5B7FB5] p-4 text-white text-center">
                                <h3 className="font-serif text-lg font-bold tracking-widest">Royal Concierge</h3>
                                <p className="text-[9px] uppercase tracking-wider opacity-85">Where Every Stay is a Reign</p>
                            </div>

                            {/* Feed */}
                            <div className="flex-grow p-4 overflow-y-auto space-y-3 bg-[#FDFBF6]/90">
                                {messages.map((m, idx) => (
                                    <div key={idx} className={`flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'}`}>

                                        <span className="text-3xl font-serif font-extrabold text-[#2C4875]">${analytics.grossRevenue?.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-2 space-y-6">
                                <div className="glass-panel rounded-3xl p-6 border border-[#D4AF37]/25">
                                    <h3 className="text-sm font-serif font-extrabold text-[#2C4875] mb-4">Suite Bookings popularities</h3>
                                    <OccupancyChart distribution={analytics.categoryDistribution} />
                                </div>
                                <div className="glass-panel rounded-3xl p-6 border border-[#D4AF37]/25">
                                    <h3 className="text-sm font-serif font-extrabold text-[#2C4875] mb-4">Room Allocation Density</h3>
                                    <DonutChart distribution={analytics.categoryDistribution} />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Main App Orchestration
        function App() {
            const [view, setView] = useState("home");
            const [rooms, setRooms] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [selectedRoomNo, setSelectedRoomNo] = useState("");
            const [activeReceipt, setActiveReceipt] = useState(null);
            
            // 360° Virtual Tour category state
            const [tourCategory, setTourCategory] = useState(null);

            // Dark Mode
            const [darkMode, setDarkMode] = useState(false);
            const toggleTheme = () => {
                setDarkMode(!darkMode);
                document.body.classList.toggle("dark-theme");
            };

            const [analytics, setAnalytics] = useState({
                totalRooms: 0,
                occupiedRooms: 0,
                occupancyRate: 0.0,
                grossRevenue: 0.0,
                categoryDistribution: { Standard: 0, Deluxe: 0, Suite: 0 }
            });

            useEffect(() => {
                fetchInitialData();
            }, []);

            const fetchInitialData = async () => {
                try {
                    const roomsRes = await fetch('/api/hotel/rooms');
                    const roomsData = await roomsRes.json();
                    setRooms(roomsData);

                    const bookingsRes = await fetch('/api/hotel/bookings');
                    const bookingsData = await bookingsRes.json();
                    setBookings(bookingsData);

                    const analyticsRes = await fetch('/api/hotel/analytics');
                    const analyticsData = await analyticsRes.json();
                    setAnalytics(analyticsData);
                } catch (err) {
                    console.error("Error loading hotel details:", err);
                }
            };

            const handleRoomSelect = (roomNo) => {
                setSelectedRoomNo(roomNo.toString());
            };

            const handleBookingComplete = (data) => {
                setActiveReceipt(data);
                setSelectedRoomNo("");
                fetchInitialData();
                setView("receipt");
            };

            const handleCancelBooking = async (bookingId) => {
                if (!window.confirm(`Are you sure you want to cancel booking: ${bookingId}?`)) return;
                try {
                    await fetch(`/api/hotel/cancel/${bookingId}`, { method: 'DELETE' });
                    fetchInitialData();
                } catch (err) {
                    console.error("Error cancelling booking:", err);
                }
            };

            const handleAddRoom = async (roomObj) => {
                setRooms(prev => [...prev, roomObj]);
                alert("Room successfully registered!");
            };

            return (
                <div className="max-w-6xl mx-auto flex-grow flex flex-col p-4 md:p-8 space-y-8 z-10 relative">
                    
                    {/* Header frosted glass navbar */}
                    <div className="glass-panel rounded-3xl p-6 flex flex-col md:flex-row items-center justify-between gap-4 border-t border-white print-hide">
                        <div className="text-center md:text-left cursor-pointer" onClick={() => setView("home")}>
                            <h1 className="text-3xl font-extrabold tracking-widest text-[#2C4875] font-serif">LUXURY</h1>
                            <p className="text-[10px] font-bold text-[#D4AF37] uppercase tracking-widest mt-0.5">Where Every Stay is a Reign</p>
                        </div>

                        {/* Navigation buttons */}
                        <div className="flex flex-wrap gap-2 md:gap-4 items-center">
                            <button 
                                onClick={() => setView("home")}
                                className={`px-4 py-2 font-bold rounded-xl transition duration-200 text-xs ${view === 'home' ? 'bg-[#2C4875] text-white shadow-md' : 'text-[#6E7791] hover:bg-[#F6EBC8]/30'}`}
                            >
                                Lobby
                            </button>
                            <button 
                                onClick={() => setView("explorer")}
                                className={`px-4 py-2 font-bold rounded-xl transition duration-200 text-xs ${view === 'explorer' ? 'bg-[#2C4875] text-white shadow-md' : 'text-[#6E7791] hover:bg-[#F6EBC8]/30'}`}
                            >
                                Chamber Grid
                            </button>
                            <button 
                                onClick={() => setView("loyalty")}
                                className={`px-4 py-2 font-bold rounded-xl transition duration-200 text-xs ${view === 'loyalty' ? 'bg-[#2C4875] text-white shadow-md' : 'text-[#6E7791] hover:bg-[#F6EBC8]/30'}`}
                            >
                                Guest Directory
                            </button>
                            <button 
                                onClick={() => setView("admin")}
                                className={`px-4 py-2 font-bold rounded-xl transition duration-200 text-xs ${view === 'admin' ? 'bg-[#2C4875] text-white shadow-md' : 'text-[#6E7791] hover:bg-[#F6EBC8]/30'}`}
                            >
                                Manager Console
                            </button>
                            
                            {/* Midnight Theme Toggle */}
                            <button 
                                onClick={toggleTheme}
                                className="w-8 h-8 rounded-full border border-[#D4AF37]/35 flex items-center justify-center text-sm bg-white shadow-inner"
                                title="Toggle Theme"
                            >
                                {darkMode ? '☀️' : '🌙'}
                            </button>
                        </div>
                    </div>

                    {/* Page Content Viewport */}
                    <div className="flex-grow">
                        {view === "home" && (
                            <HomeView 
                                onExploreClick={() => setView("explorer")} 
                                rooms={rooms}
                            />
                        )}
                        {view === "explorer" && (
                            <ExplorerView 
                                rooms={rooms} 
                                bookings={bookings} 
                                selectedRoomNo={selectedRoomNo} 
                                onRoomSelect={handleRoomSelect}
                                onBookClick={() => setView("booking")}
                                onLaunchTour={(cat) => setTourCategory(cat)}
                            />
                        )}
                        {view === "booking" && (
                            <BookingWizard 
                                rooms={rooms} 
                                selectedRoomNo={selectedRoomNo}
                                bookings={bookings}
                                onBookingComplete={handleBookingComplete}
                            />
                        )}
                        {view === "receipt" && activeReceipt && (
                            <BookingConfirmation 
                                bookingData={activeReceipt} 
                                onDone={() => setView("home")}
                            />
                        )}
                        {view === "loyalty" && (
                            <LoyaltyDashboard bookings={bookings} />
                        )}
                        {view === "admin" && (
                            <AdminDashboard 
                                rooms={rooms} 
                                bookings={bookings} 
                                analytics={analytics}
                                onCancelBooking={handleCancelBooking}
                                onAddRoom={handleAddRoom}
                            />
                        )}
                    </div>

                    {/* Interactive 360 Virtual Tour Overlay */}
                    {tourCategory && (
                        <Virtual360Tour 
                            suiteCategory={tourCategory} 
                            onClose={() => setTourCategory(null)}
                        />
                    )}

                    {/* Royal Concierge floating AI bot */}
                    <RoyalConcierge currentView={view} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
