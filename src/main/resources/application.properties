spring.application.name=hotel-reservation-system

# H2 Database configuration with local file persistence
spring.datasource.url=jdbc:h2:file:./data/hoteldb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Automatically update the database schema
spring.jpa.hibernate.ddl-auto=update

# Enable console (optional for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Port Configuration
server.port=8082
