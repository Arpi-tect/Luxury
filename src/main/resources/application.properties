spring.application.name=hotel-reservation-system

# Dynamic Database configuration (falls back to H2 if Postgres env vars are not set)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/hoteldb;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_PLATFORM:org.hibernate.dialect.H2Dialect}

# Automatically update the database schema
spring.jpa.hibernate.ddl-auto=update

# Enable console (optional for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Port Configuration
server.port=8082

# Razorpay Credentials
razorpay.key_id=rzp_test_mockKeyId123
razorpay.key_secret=mockKeySecret456

# Gemini AI API Key (reads from environment if present)
ai.gemini.api_key=${GEMINI_API_KEY:mock_gemini_api_key}
